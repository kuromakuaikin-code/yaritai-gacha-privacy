<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#e05a7a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="デートメモ">
<title>婚活デートメモ</title>
<style>
:root{
  --bg:#faf6f7;--card:#ffffff;--text:#3a2e33;--sub:#8d7b82;--line:#f0e4e8;
  --accent:#e05a7a;--accent-soft:#fdeef2;--accent-dark:#c74564;
  --green:#3d9970;--green-soft:#e7f5ee;--blue:#4a7fb5;--blue-soft:#eaf1f8;
  --gray:#9a8f94;--gray-soft:#f1edef;--gold:#e8a33d;
  --danger:#d64545;--radius:14px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#1c171a;--card:#282126;--text:#f2e9ed;--sub:#a8969e;--line:#3a3036;
    --accent:#e87693;--accent-soft:#3a262d;--accent-dark:#f08fa8;
    --green:#5cbb92;--green-soft:#243830;--blue:#7aa7d4;--blue-soft:#25313e;
    --gray:#a09298;--gray-soft:#332c30;--gold:#e8b45f;
  }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;
  padding-top:var(--safe-top);overscroll-behavior-y:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px;color:var(--text);
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:64px}

header{position:sticky;top:0;z-index:20;background:var(--bg);
  padding:calc(10px + var(--safe-top)) 16px 10px;margin-top:calc(-1 * var(--safe-top));
  display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
header h1{font-size:17px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbtn{font-size:14px;color:var(--accent);font-weight:600;padding:6px 8px;flex-shrink:0}
main{max-width:560px;margin:0 auto;padding:14px 16px calc(96px + var(--safe-bottom))}

.search{display:flex;gap:8px;margin-bottom:10px}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch}
.chip{flex-shrink:0;font-size:12.5px;font-weight:600;padding:5px 12px;border-radius:999px;
  background:var(--gray-soft);color:var(--sub);border:1px solid transparent}
.chip.on{background:var(--accent-soft);color:var(--accent-dark);border-color:var(--accent)}

.card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid var(--line)}
.p-card{display:block;width:100%;text-align:left}
.p-card:active{transform:scale(.985)}
.p-top{display:flex;align-items:center;gap:10px}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--accent-soft);color:var(--accent-dark);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0}
.p-name{font-weight:700;font-size:16px}
.p-meta{font-size:12.5px;color:var(--sub)}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;margin-left:auto;flex-shrink:0}
.st-active{background:var(--accent-soft);color:var(--accent-dark)}
.st-watch{background:var(--blue-soft);color:var(--blue)}
.st-serious{background:var(--green-soft);color:var(--green)}
.st-end{background:var(--gray-soft);color:var(--gray)}
.p-foot{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:12.5px;color:var(--sub)}
.stars{color:var(--gold);letter-spacing:1px;font-size:13px}

.empty{text-align:center;color:var(--sub);padding:56px 20px}
.empty .big{font-size:44px;margin-bottom:10px}

.fab{position:fixed;right:20px;bottom:calc(24px + var(--safe-bottom));z-index:15;
  width:58px;height:58px;border-radius:50%;background:var(--accent);color:#fff;
  font-size:30px;font-weight:300;box-shadow:0 4px 14px rgba(224,90,122,.45);
  display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(.94)}

.sec-title{font-size:13px;font-weight:700;color:var(--sub);margin:18px 2px 8px;
  display:flex;align-items:center}
.sec-title .hbtn{margin-left:auto;padding:0 2px}
.prof-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:14px}
.prof-grid dt{color:var(--sub);font-size:12.5px;padding-top:2px;white-space:nowrap}
.prof-grid dd{white-space:pre-wrap;word-break:break-word}

.d-card{position:relative}
.d-head{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
.d-no{font-size:11px;font-weight:700;color:var(--accent-dark);background:var(--accent-soft);
  padding:2px 8px;border-radius:999px;flex-shrink:0}
.d-date{font-size:13px;font-weight:700}
.d-place{font-size:12.5px;color:var(--sub);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-body{font-size:13.5px;white-space:pre-wrap;word-break:break-word}
.d-label{font-size:11.5px;font-weight:700;margin-top:6px}
.d-label.good{color:var(--green)}.d-label.bad{color:var(--danger)}.d-label.next{color:var(--blue)}
.d-edit{position:absolute;top:10px;right:12px;font-size:12px;color:var(--sub);padding:4px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:none;
  align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.sheet{background:var(--bg);width:100%;max-width:560px;max-height:92%;overflow-y:auto;
  border-radius:18px 18px 0 0;padding:16px 18px calc(24px + var(--safe-bottom));
  -webkit-overflow-scrolling:touch}
.sheet h2{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center}
.sheet h2 .hbtn{margin-left:auto;font-weight:400;color:var(--sub)}
.f-row{margin-bottom:12px}
.f-row label{display:block;font-size:12.5px;font-weight:700;color:var(--sub);margin-bottom:5px}
.f-cols{display:flex;gap:10px}.f-cols>.f-row{flex:1}
.rate-in{display:flex;gap:4px;font-size:30px;color:#c9bfc4}
.rate-in button{padding:2px}
.rate-in button.on{color:var(--gold)}
.btn{display:block;width:100%;text-align:center;font-size:16px;font-weight:700;
  padding:14px;border-radius:12px;margin-top:6px}
.btn-main{background:var(--accent);color:#fff}
.btn-main:active{background:var(--accent-dark)}
.btn-sub{background:var(--gray-soft);color:var(--text);margin-top:10px}
.btn-danger-text{color:var(--danger);font-size:14px;padding:14px;width:100%;text-align:center;margin-top:4px}

.set-item{display:flex;align-items:center;width:100%;text-align:left;
  padding:14px 16px;font-size:15px;gap:10px}
.set-item+.set-item{border-top:1px solid var(--line)}
.set-item .arr{margin-left:auto;color:var(--sub)}
.set-note{font-size:12px;color:var(--sub);margin:8px 4px 16px}
.card.plain{padding:0;overflow:hidden}

#lock{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:18px}
#lock.show{display:flex}
#lock .big{font-size:40px}
.dots{display:flex;gap:14px}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--accent);background:transparent}
.dot.fill{background:var(--accent)}
.pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.pad button{height:64px;font-size:24px;font-weight:600;border-radius:50%;background:var(--card);
  border:1px solid var(--line)}
.pad button:active{background:var(--accent-soft)}
.shake{animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.toast{position:fixed;left:50%;bottom:calc(100px + var(--safe-bottom));transform:translateX(-50%);
  background:var(--text);color:var(--bg);font-size:13.5px;font-weight:600;
  padding:10px 18px;border-radius:999px;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;
  white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="lock">
  <div class="big">🔒</div>
  <div id="lockMsg" style="font-weight:700">パスコードを入力</div>
  <div class="dots" id="lockDots"></div>
  <div class="pad" id="lockPad"></div>
</div>

<header>
  <button class="hbtn" id="backBtn" style="display:none">‹ 戻る</button>
  <h1 id="title">婚活デートメモ</h1>
  <button class="hbtn" id="menuBtn">設定</button>
</header>

<main id="main"></main>
<button class="fab" id="fab">＋</button>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
'use strict';
const KEY='konkatsu_date_memo_v1';
const STATUSES=[
  {id:'active', label:'やり取り中', cls:'st-active'},
  {id:'watch',  label:'様子見',     cls:'st-watch'},
  {id:'serious',label:'真剣交際',   cls:'st-serious'},
  {id:'end',    label:'ご縁なし',   cls:'st-end'},
];
const stMap=Object.fromEntries(STATUSES.map(s=>[s.id,s]));

let db=load();
let view={name:'list'};        // {name:'list'} | {name:'detail', id}
let filter='all', query='';

function load(){
  try{
    const d=JSON.parse(localStorage.getItem(KEY));
    if(d && Array.isArray(d.partners)) return d;
  }catch(e){}
  return {partners:[],passcode:null};
}
function save(){ localStorage.setItem(KEY,JSON.stringify(db)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function partner(id){ return db.partners.find(p=>p.id===id); }
function fmtDate(iso){
  if(!iso) return '';
  const [y,m,d]=iso.split('-');
  return `${y}/${Number(m)}/${Number(d)}`;
}
function stars(n){ return n?'★'.repeat(n)+'☆'.repeat(5-n):''; }
function lastDate(p){
  if(!p.dates.length) return null;
  return [...p.dates].sort((a,b)=>b.date.localeCompare(a.date))[0];
}
function avgRating(p){
  const r=p.dates.filter(d=>d.rating);
  if(!r.length) return 0;
  return Math.round(r.reduce((s,d)=>s+d.rating,0)/r.length);
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ---------- render ---------- */
const $main=document.getElementById('main');
const $title=document.getElementById('title');
const $back=document.getElementById('backBtn');
const $fab=document.getElementById('fab');

function render(){
  if(view.name==='detail'){
    const p=partner(view.id);
    if(!p){ view={name:'list'}; return render(); }
    renderDetail(p);
  }else{
    renderList();
  }
}

function renderList(){
  $title.textContent='婚活デートメモ';
  $back.style.display='none';
  $fab.style.display='flex';

  let list=db.partners.filter(p=>filter==='all'||p.status===filter);
  if(query){
    const q=query.toLowerCase();
    list=list.filter(p=>(p.name+p.job+p.metVia+p.memo).toLowerCase().includes(q));
  }
  list.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));

  const chips=[{id:'all',label:'すべて'},...STATUSES].map(s=>
    `<button class="chip ${filter===s.id?'on':''}" data-f="${s.id}">${s.label}</button>`).join('');

  const cards=list.map(p=>{
    const st=stMap[p.status]||STATUSES[0];
    const ld=lastDate(p);
    const av=avgRating(p);
    const meta=[p.age?`${esc(p.age)}歳`:'',esc(p.job||''),esc(p.metVia||'')].filter(Boolean).join('・');
    return `<button class="card p-card" data-id="${p.id}">
      <div class="p-top">
        <div class="avatar">${esc((p.name||'?').slice(0,1))}</div>
        <div style="min-width:0">
          <div class="p-name">${esc(p.name)}</div>
          <div class="p-meta">${meta||'&nbsp;'}</div>
        </div>
        <span class="badge ${st.cls}">${st.label}</span>
      </div>
      <div class="p-foot">
        <span>💬 ${p.dates.length}回</span>
        ${ld?`<span>📅 ${fmtDate(ld.date)}</span>`:''}
        ${av?`<span class="stars">${stars(av)}</span>`:''}
      </div>
    </button>`;
  }).join('');

  $main.innerHTML=`
    <div class="search"><input type="search" id="q" placeholder="名前・職業・出会いで検索" value="${esc(query)}"></div>
    <div class="chips">${chips}</div>
    ${cards || `<div class="empty"><div class="big">💐</div>お相手がまだ登録されていません。<br>右下の「＋」から追加しましょう。</div>`}`;

  $main.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{filter=c.dataset.f;render();});
  $main.querySelectorAll('.p-card').forEach(c=>c.onclick=()=>{view={name:'detail',id:c.dataset.id};render();window.scrollTo(0,0);});
  const q=$main.querySelector('#q');
  q.oninput=()=>{query=q.value;renderListDebounced();};
}
let _deb;
function renderListDebounced(){ clearTimeout(_deb); _deb=setTimeout(render,200); }

function renderDetail(p){
  $title.textContent=p.name;
  $back.style.display='block';
  $fab.style.display='none';
  const st=stMap[p.status]||STATUSES[0];

  const prof=[
    ['年齢',p.age?`${p.age}歳`:''],['職業',p.job],['出会い',p.metVia],
    ['好きなもの',p.likes],['NG・地雷',p.ng],['メモ',p.memo],
  ].filter(([,v])=>v).map(([k,v])=>`<dt>${k}</dt><dd>${esc(v)}</dd>`).join('');

  const dates=[...p.dates].sort((a,b)=>b.date.localeCompare(a.date)).map((d,i,arr)=>{
    const no=arr.length-i;
    return `<div class="card d-card">
      <button class="d-edit" data-did="${d.id}">編集</button>
      <div class="d-head">
        <span class="d-no">${no}回目</span>
        <span class="d-date">${fmtDate(d.date)}</span>
        <span class="d-place">${esc(d.place||'')}</span>
      </div>
      ${d.rating?`<div class="stars" style="margin-bottom:4px">${stars(d.rating)}</div>`:''}
      ${d.topics?`<div class="d-body">${esc(d.topics)}</div>`:''}
      ${d.good?`<div class="d-label good">👍 良かったこと</div><div class="d-body">${esc(d.good)}</div>`:''}
      ${d.bad?`<div class="d-label bad">🤔 気になったこと</div><div class="d-body">${esc(d.bad)}</div>`:''}
      ${d.next?`<div class="d-label next">📌 次回・宿題</div><div class="d-body">${esc(d.next)}</div>`:''}
    </div>`;
  }).join('');

  $main.innerHTML=`
    <div class="card">
      <div class="p-top" style="margin-bottom:${prof?'12px':'0'}">
        <div class="avatar">${esc((p.name||'?').slice(0,1))}</div>
        <div class="p-name" style="flex:1">${esc(p.name)}</div>
        <span class="badge ${st.cls}">${st.label}</span>
      </div>
      ${prof?`<dl class="prof-grid">${prof}</dl>`:''}
    </div>
    <button class="hbtn" id="editP" style="display:block;margin-left:auto">プロフィールを編集</button>
    <div class="sec-title">デート記録（${p.dates.length}回）
      <button class="hbtn" id="addD">＋ 記録を追加</button></div>
    ${dates || `<div class="empty" style="padding:28px"><div class="big">📝</div>まだ記録がありません。<br>デートの後に振り返りを残しましょう。</div>`}`;

  $main.querySelector('#editP').onclick=()=>openPartnerForm(p);
  $main.querySelector('#addD').onclick=()=>openDateForm(p,null);
  $main.querySelectorAll('.d-edit').forEach(b=>b.onclick=()=>{
    openDateForm(p,p.dates.find(d=>d.id===b.dataset.did));
  });
}

document.getElementById('backBtn').onclick=()=>{view={name:'list'};render();};
$fab.onclick=()=>openPartnerForm(null);

/* ---------- sheets ---------- */
const $ov=document.getElementById('overlay');
const $sheet=document.getElementById('sheet');
function openSheet(html){ $sheet.innerHTML=html; $ov.classList.add('show'); $sheet.scrollTop=0; }
function closeSheet(){ $ov.classList.remove('show'); }
$ov.addEventListener('click',e=>{ if(e.target===$ov) closeSheet(); });

function statusOpts(sel){
  return STATUSES.map(s=>`<option value="${s.id}" ${s.id===sel?'selected':''}>${s.label}</option>`).join('');
}

function openPartnerForm(p){
  openSheet(`
    <h2>${p?'プロフィールを編集':'お相手を追加'}<button class="hbtn" id="shClose">閉じる</button></h2>
    <div class="f-row"><label>名前・ニックネーム *</label><input id="fName" value="${esc(p?.name||'')}" placeholder="例：Aさん、カフェの田中さん"></div>
    <div class="f-cols">
      <div class="f-row"><label>年齢</label><input id="fAge" inputmode="numeric" value="${esc(p?.age||'')}" placeholder="32"></div>
      <div class="f-row"><label>ステータス</label><select id="fStatus">${statusOpts(p?.status||'active')}</select></div>
    </div>
    <div class="f-row"><label>職業</label><input id="fJob" value="${esc(p?.job||'')}" placeholder="例：メーカー営業"></div>
    <div class="f-row"><label>出会い</label><input id="fMet" value="${esc(p?.metVia||'')}" placeholder="例：○○アプリ、相談所、友人の紹介"></div>
    <div class="f-row"><label>好きなもの・趣味</label><textarea id="fLikes" placeholder="例：コーヒー、登山、猫を飼っている">${esc(p?.likes||'')}</textarea></div>
    <div class="f-row"><label>NG・地雷（触れない話題など）</label><textarea id="fNg" placeholder="例：転職の話は避ける">${esc(p?.ng||'')}</textarea></div>
    <div class="f-row"><label>メモ</label><textarea id="fMemo" placeholder="第一印象、家族構成など">${esc(p?.memo||'')}</textarea></div>
    <button class="btn btn-main" id="shSave">保存</button>
    ${p?`<button class="btn-danger-text" id="shDel">このお相手を削除</button>`:''}
  `);
  document.getElementById('shClose').onclick=closeSheet;
  document.getElementById('shSave').onclick=()=>{
    const name=document.getElementById('fName').value.trim();
    if(!name){ toast('名前を入力してください'); return; }
    const vals={
      name, age:document.getElementById('fAge').value.trim(),
      status:document.getElementById('fStatus').value,
      job:document.getElementById('fJob').value.trim(),
      metVia:document.getElementById('fMet').value.trim(),
      likes:document.getElementById('fLikes').value.trim(),
      ng:document.getElementById('fNg').value.trim(),
      memo:document.getElementById('fMemo').value.trim(),
      updatedAt:Date.now(),
    };
    if(p){ Object.assign(p,vals); }
    else{ db.partners.push({id:uid(),dates:[],createdAt:Date.now(),...vals}); }
    save(); closeSheet(); render(); toast('保存しました');
  };
  const del=document.getElementById('shDel');
  if(del) del.onclick=()=>{
    if(!confirm(`「${p.name}」を記録ごと削除します。よろしいですか？`)) return;
    db.partners=db.partners.filter(x=>x.id!==p.id);
    save(); closeSheet(); view={name:'list'}; render(); toast('削除しました');
  };
}

function openDateForm(p,d){
  const today=new Date();
  const iso=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  let rating=d?.rating||0;
  openSheet(`
    <h2>${d?'デート記録を編集':'デート記録を追加'}<button class="hbtn" id="shClose">閉じる</button></h2>
    <div class="f-cols">
      <div class="f-row"><label>日付 *</label><input type="date" id="fDate" value="${d?.date||iso}"></div>
    </div>
    <div class="f-row"><label>場所・プラン</label><input id="fPlace" value="${esc(d?.place||'')}" placeholder="例：表参道でランチ→散歩"></div>
    <div class="f-row"><label>手応え</label><div class="rate-in" id="fRate">${[1,2,3,4,5].map(n=>`<button data-n="${n}" class="${n<=rating?'on':''}">★</button>`).join('')}</div></div>
    <div class="f-row"><label>話したこと・内容</label><textarea id="fTopics" placeholder="例：お互いの休日の過ごし方、家族の話">${esc(d?.topics||'')}</textarea></div>
    <div class="f-row"><label>👍 良かったこと</label><textarea id="fGood" placeholder="例：店員さんへの態度が丁寧だった">${esc(d?.good||'')}</textarea></div>
    <div class="f-row"><label>🤔 気になったこと</label><textarea id="fBad" placeholder="例：会話中スマホをよく見ていた">${esc(d?.bad||'')}</textarea></div>
    <div class="f-row"><label>📌 次回の予定・宿題</label><textarea id="fNext" placeholder="例：次はおすすめの水族館へ。誕生日を聞く">${esc(d?.next||'')}</textarea></div>
    <button class="btn btn-main" id="shSave">保存</button>
    ${d?`<button class="btn-danger-text" id="shDel">この記録を削除</button>`:''}
  `);
  document.getElementById('shClose').onclick=closeSheet;
  document.getElementById('fRate').querySelectorAll('button').forEach(b=>b.onclick=()=>{
    const n=Number(b.dataset.n);
    rating=(rating===n)?0:n;
    document.getElementById('fRate').querySelectorAll('button').forEach(x=>
      x.classList.toggle('on',Number(x.dataset.n)<=rating));
  });
  document.getElementById('shSave').onclick=()=>{
    const date=document.getElementById('fDate').value;
    if(!date){ toast('日付を入力してください'); return; }
    const vals={
      date, place:document.getElementById('fPlace').value.trim(), rating,
      topics:document.getElementById('fTopics').value.trim(),
      good:document.getElementById('fGood').value.trim(),
      bad:document.getElementById('fBad').value.trim(),
      next:document.getElementById('fNext').value.trim(),
    };
    if(d){ Object.assign(d,vals); }
    else{ p.dates.push({id:uid(),...vals}); }
    p.updatedAt=Date.now();
    save(); closeSheet(); render(); toast('保存しました');
  };
  const del=document.getElementById('shDel');
  if(del) del.onclick=()=>{
    if(!confirm('この記録を削除します。よろしいですか？')) return;
    p.dates=p.dates.filter(x=>x.id!==d.id);
    p.updatedAt=Date.now();
    save(); closeSheet(); render(); toast('削除しました');
  };
}

/* ---------- settings ---------- */
document.getElementById('menuBtn').onclick=openSettings;
function openSettings(){
  openSheet(`
    <h2>設定<button class="hbtn" id="shClose">閉じる</button></h2>
    <div class="card plain">
      <button class="set-item" id="setLock">🔒 パスコードロック<span class="arr">${db.passcode?'オン ›':'オフ ›'}</span></button>
      <button class="set-item" id="setExport">📤 バックアップを書き出す<span class="arr">›</span></button>
      <button class="set-item" id="setImport">📥 バックアップを読み込む<span class="arr">›</span></button>
      <button class="set-item" id="setWipe" style="color:var(--danger)">🗑 全データを削除</button>
    </div>
    <p class="set-note">データはすべてこの端末（ブラウザ）の中にだけ保存され、外部には送信されません。機種変更の際はバックアップの書き出し・読み込みをご利用ください。<br><br>
    ※ パスコードは簡易的な画面ロックです。端末自体のロックも併せてご利用ください。</p>
    <input type="file" id="impFile" accept="application/json" style="display:none">
  `);
  document.getElementById('shClose').onclick=closeSheet;

  document.getElementById('setLock').onclick=()=>{
    if(db.passcode){
      if(confirm('パスコードロックを解除しますか？')){
        db.passcode=null; save(); toast('ロックを解除しました'); openSettings();
      }
    }else{
      const c=prompt('4桁の数字を入力してください');
      if(c===null) return;
      if(!/^\d{4}$/.test(c)){ toast('4桁の数字で入力してください'); return; }
      db.passcode=c; save(); toast('ロックを設定しました'); openSettings();
    }
  };
  document.getElementById('setExport').onclick=()=>{
    const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='konkatsu-date-memo-backup.json';
    a.click();
    URL.revokeObjectURL(a.href);
  };
  const fileIn=document.getElementById('impFile');
  document.getElementById('setImport').onclick=()=>fileIn.click();
  fileIn.onchange=()=>{
    const f=fileIn.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const d=JSON.parse(r.result);
        if(!d||!Array.isArray(d.partners)) throw 0;
        if(!confirm(`バックアップ（お相手${d.partners.length}名）で現在のデータを置き換えますか？`)) return;
        db=d; save(); closeSheet(); view={name:'list'}; render(); toast('読み込みました');
      }catch(e){ toast('ファイルを読み込めませんでした'); }
    };
    r.readAsText(f);
  };
  document.getElementById('setWipe').onclick=()=>{
    if(!confirm('すべてのお相手と記録を削除します。元に戻せません。よろしいですか？')) return;
    if(!confirm('本当に削除しますか？')) return;
    db={partners:[],passcode:null}; save();
    closeSheet(); view={name:'list'}; render(); toast('削除しました');
  };
}

/* ---------- passcode lock ---------- */
const $lock=document.getElementById('lock');
function showLock(){
  if(!db.passcode) return;
  $lock.classList.add('show');
  let input='';
  const dots=document.getElementById('lockDots');
  const pad=document.getElementById('lockPad');
  const drawDots=()=>{ dots.innerHTML=[0,1,2,3].map(i=>`<div class="dot ${i<input.length?'fill':''}"></div>`).join(''); };
  drawDots();
  pad.innerHTML=[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>
    k===''?'<span></span>':`<button data-k="${k}">${k}</button>`).join('');
  pad.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    const k=b.dataset.k;
    if(k==='⌫'){ input=input.slice(0,-1); drawDots(); return; }
    if(input.length>=4) return;
    input+=k; drawDots();
    if(input.length===4){
      if(input===db.passcode){ $lock.classList.remove('show'); }
      else{
        dots.classList.add('shake');
        setTimeout(()=>{ dots.classList.remove('shake'); input=''; drawDots(); },350);
      }
    }
  });
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden' && db.passcode) $lock.classList.add('show');
  if(document.visibilityState==='visible' && db.passcode && $lock.classList.contains('show')) showLock();
});

showLock();
render();
</script>
</body>
</html>
