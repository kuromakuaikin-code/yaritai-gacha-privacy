<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#e05a7a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="デートメモ">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<title>婚活デートメモ</title>
<style>
:root{
  --bg:#faf6f7;--card:#ffffff;--text:#2e2227;--sub:#6f5b64;--line:#eddde3;
  --accent:#e05a7a;--accent-soft:#fdeef2;--accent-dark:#c74564;
  --green:#3d9970;--green-soft:#e7f5ee;--blue:#4a7fb5;--blue-soft:#eaf1f8;
  --gray:#9a8f94;--gray-soft:#f1edef;--gold:#e8a33d;
  --danger:#d64545;--radius:14px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#1c171a;--card:#282126;--text:#f5edf1;--sub:#bcaab3;--line:#413740;
    --accent:#e87693;--accent-soft:#3a262d;--accent-dark:#f08fa8;
    --green:#5cbb92;--green-soft:#243830;--blue:#7aa7d4;--blue-soft:#25313e;
    --gray:#a09298;--gray-soft:#332c30;--gold:#e8b45f;
  }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:var(--bg);color:var(--text);font-size:16px;line-height:1.65;
  padding-top:var(--safe-top);overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px;color:var(--text);
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:64px}

header{position:sticky;top:0;z-index:20;background:var(--bg);
  padding:calc(10px + var(--safe-top)) 16px 10px;margin-top:calc(-1 * var(--safe-top));
  display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
header h1{font-size:18px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbtn{font-size:15px;color:var(--accent-dark);font-weight:700;padding:6px 8px;flex-shrink:0}
main{max-width:560px;margin:0 auto;padding:14px 16px calc(140px + var(--safe-bottom))}

#tabbar{position:fixed;left:0;right:0;bottom:0;z-index:25;display:flex;
  background:var(--card);border-top:1px solid var(--line);
  padding-bottom:var(--safe-bottom)}

#adbar{display:none;position:fixed;left:0;right:0;bottom:calc(62px + var(--safe-bottom));z-index:24;
  height:52px;background:var(--card);border-top:1px solid var(--line);
  padding:0 12px;align-items:center;gap:8px;font-size:12.5px;color:var(--sub);text-align:left}
body.with-ad #adbar{display:flex}
body.with-ad main{padding-bottom:calc(190px + var(--safe-bottom))}
body.with-ad .fab{bottom:calc(140px + var(--safe-bottom))}
.ad-tag{flex-shrink:0;font-size:10.5px;font-weight:700;border:1px solid var(--line);
  border-radius:4px;padding:1px 6px;color:var(--gray)}
.ad-body{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ad-off{flex-shrink:0;font-size:12px;font-weight:700;color:var(--accent-dark)}
#tabbar button{flex:1;padding:8px 0 7px;font-size:11.5px;font-weight:700;color:var(--sub);
  display:flex;flex-direction:column;align-items:center;gap:2px}
#tabbar button.on{color:var(--accent-dark)}
#tabbar button:not(.on) .ti{filter:grayscale(1);opacity:.55}
#tabbar .ti{font-size:22px;line-height:1.2;transition:transform .18s}
#tabbar button.on .ti{transform:translateY(-1px) scale(1.12)}

.search{display:flex;gap:8px;margin-bottom:10px}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch}
.chip{flex-shrink:0;font-size:13.5px;font-weight:700;padding:6px 14px;border-radius:999px;
  background:var(--gray-soft);color:var(--sub);border:1px solid transparent}
.chip.on{background:var(--accent-soft);color:var(--accent-dark);border-color:var(--accent)}
.chips.wrap{flex-wrap:wrap;overflow:visible;padding-bottom:0}
.chip.st-active.on{background:var(--accent-soft);color:var(--accent-dark);border-color:var(--accent)}
.chip.st-watch.on{background:var(--blue-soft);color:var(--blue);border-color:var(--blue)}
.chip.st-serious.on{background:var(--green-soft);color:var(--green);border-color:var(--green)}
.chip.st-end.on{background:var(--gray-soft);color:var(--gray);border-color:var(--gray)}
@keyframes vfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.vfade{animation:vfade .22s ease}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}
input[type=checkbox]:checked{animation:pop .25s}
.rate-in button.pop{animation:pop .25s}
.num-pop{display:inline-block;animation:pop .3s}
.t-sub:not([hidden]){animation:vfade .18s ease}
#gRes .card{animation:vfade .3s ease backwards}
#gRes .card:nth-child(2){animation-delay:.08s}
#gRes .card:nth-child(3){animation-delay:.16s}

.tl{position:relative;padding-left:18px}
.tl::before{content:'';position:absolute;left:5px;top:14px;bottom:14px;width:2px;background:var(--line)}
.tl .d-card::before{content:'';position:absolute;left:-17px;top:18px;width:10px;height:10px;
  border-radius:50%;background:var(--accent);border:2px solid var(--bg)}

#splash{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;
  gap:10px;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:var(--accent-dark);
  transition:opacity .35s}
#splash .sp-heart{font-size:58px;animation:pop .5s}
#splash.hide{opacity:0;pointer-events:none}

.card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 4px 14px rgba(0,0,0,.04);border:1px solid var(--line)}
.p-card{display:block;width:100%;text-align:left;transition:transform .12s}
.p-card:active{transform:scale(.985)}
.p-top{display:flex;align-items:center;gap:10px}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--accent-soft);color:var(--accent-dark);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0}
.av0{background:#fdeef2;color:#c74564}.av1{background:#eaf1f8;color:#4a7fb5}
.av2{background:#e7f5ee;color:#2f8a63}.av3{background:#fdf3e2;color:#ad7418}
.av4{background:#f1eafa;color:#7a5cbb}.av5{background:#e6f4f4;color:#357f7f}
@media (prefers-color-scheme:dark){
  .av0{background:#3a262d;color:#f08fa8}.av1{background:#25313e;color:#7aa7d4}
  .av2{background:#243830;color:#5cbb92}.av3{background:#3a3122;color:#e8b45f}
  .av4{background:#2f2839;color:#b39ae0}.av5{background:#223434;color:#6fbcbc}
}
.p-name{font-weight:700;font-size:17px}
.p-meta{font-size:13.5px;color:var(--sub)}
.badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;margin-left:auto;flex-shrink:0}
.st-active{background:var(--accent-soft);color:var(--accent-dark)}
.st-watch{background:var(--blue-soft);color:var(--blue)}
.st-serious{background:var(--green-soft);color:var(--green)}
.st-end{background:var(--gray-soft);color:var(--gray)}
.p-foot{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:13.5px;color:var(--sub)}
.p-next{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-size:13.5px;font-weight:600;color:var(--blue);margin-top:6px}
.stars{color:var(--gold);letter-spacing:1px;font-size:14px}

.empty{text-align:center;color:var(--sub);padding:56px 20px}
.empty .big{font-size:44px;margin-bottom:10px}

.fab{position:fixed;right:20px;bottom:calc(84px + var(--safe-bottom));z-index:15;
  width:58px;height:58px;border-radius:50%;color:#fff;
  background:linear-gradient(135deg,#ec7590,#c74564);
  font-size:30px;font-weight:300;box-shadow:0 6px 16px rgba(199,69,100,.4);
  display:flex;align-items:center;justify-content:center;transition:transform .12s}
.fab:active{transform:scale(.92)}

.sec-title{font-size:14px;font-weight:700;color:var(--sub);margin:18px 2px 8px;
  display:flex;align-items:center}
.sec-title .hbtn{margin-left:auto;padding:0 2px}
.prof-grid{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:15px}
.prof-grid dt{color:var(--sub);font-size:13.5px;padding-top:2px;white-space:nowrap}
.prof-grid dd{white-space:pre-wrap;word-break:break-word}

.d-card{position:relative}
.d-head{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
.d-no{font-size:12px;font-weight:700;color:var(--accent-dark);background:var(--accent-soft);
  padding:2px 9px;border-radius:999px;flex-shrink:0}
.d-date{font-size:14.5px;font-weight:700}
.d-place{font-size:13.5px;color:var(--sub);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-body{font-size:15px;white-space:pre-wrap;word-break:break-word}
.d-label{font-size:12.5px;font-weight:700;margin-top:8px}
.d-label.good{color:var(--green)}.d-label.bad{color:var(--danger)}.d-label.next{color:var(--blue)}
.d-edit{position:absolute;top:10px;right:12px;font-size:13px;color:var(--sub);padding:4px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:flex;
  align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;
  transition:opacity .22s,visibility .22s}
.overlay.show{opacity:1;visibility:visible}
.sheet{background:var(--bg);width:100%;max-width:560px;max-height:92%;overflow-y:auto;
  border-radius:18px 18px 0 0;padding:16px 18px calc(24px + var(--safe-bottom));
  -webkit-overflow-scrolling:touch;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,.33,1)}
.overlay.show .sheet{transform:none}
.sheet h2{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center}
.sheet h2 .hbtn{margin-left:auto;font-weight:400;color:var(--sub)}
.f-row{margin-bottom:12px}
.f-row label{display:block;font-size:13.5px;font-weight:700;color:var(--sub);margin-bottom:5px}
.f-cols{display:flex;gap:10px}.f-cols>.f-row{flex:1}
.rate-in{display:flex;gap:4px;font-size:30px;color:#c9bfc4}
.rate-in button{padding:2px}
.rate-in button.on{color:var(--gold)}
.btn{display:block;width:100%;text-align:center;font-size:16px;font-weight:700;
  padding:14px;border-radius:12px;margin-top:6px}
.btn-main{background:var(--accent);color:#fff}
.btn-main:active{background:var(--accent-dark)}
.btn-sub{background:var(--gray-soft);color:var(--text);margin-top:10px}
.btn-danger-text{color:var(--danger);font-size:14px;padding:14px;width:100%;text-align:center;margin-top:4px}

.t-item+.t-item{border-top:1px solid var(--line)}
.t-row{display:flex;align-items:center;gap:10px;padding:13px 12px 13px 16px;font-size:15.5px;width:100%;text-align:left}
.t-row input[type=checkbox]{width:22px;height:22px;flex-shrink:0;accent-color:var(--accent)}
.t-main{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.t-text{flex:1;word-break:break-word}
.t-exp{color:var(--sub);padding:6px 10px;font-size:12px;transition:transform .2s;flex-shrink:0}
.t-exp.open{transform:rotate(180deg)}
.t-sub{padding:0 16px 14px 24px;display:flex;flex-direction:column;gap:7px}
.t-sub[hidden]{display:none}
.fl-q{font-size:14.5px;line-height:1.55;color:var(--text);background:var(--accent-soft);
  border-radius:12px 12px 12px 4px;padding:9px 13px;align-self:flex-start;max-width:92%}
.fl-a{font-size:14.5px;line-height:1.55;color:var(--sub);background:var(--gray-soft);
  border-radius:12px 12px 4px 12px;padding:9px 13px;align-self:flex-end;max-width:92%}
.fl-lbl{font-size:12.5px;font-weight:700;color:var(--sub);margin-top:3px}
.fl-d{display:flex;gap:8px;align-items:flex-start;font-size:14.5px;line-height:1.55}
.fl-tag{flex-shrink:0;font-size:11.5px;font-weight:700;background:var(--blue-soft);
  color:var(--blue);border-radius:999px;padding:2px 9px;margin-top:3px;white-space:nowrap}
.t-text.done{color:var(--sub);text-decoration:line-through}
.t-del{color:var(--sub);font-size:16px;padding:2px 6px;flex-shrink:0}
.t-edit{color:var(--accent-dark);font-size:13px;font-weight:700;padding:6px 8px;flex-shrink:0}
.t-progress{height:6px;border-radius:999px;background:var(--gray-soft);overflow:hidden;margin-top:8px}
.t-progress>div{height:100%;background:var(--accent);border-radius:999px;transition:width .3s}

.locked-wrap{position:relative}
.locked-rows{filter:blur(3px);opacity:.55;pointer-events:none;user-select:none}
.unlock-btn{position:absolute;inset:0;display:flex;flex-direction:column;gap:4px;
  align-items:center;justify-content:center;font-weight:700;font-size:15px;color:var(--accent-dark)}
.unlock-btn small{font-weight:700;font-size:12.5px;color:var(--sub)}
.pv-card{background:linear-gradient(135deg,#e0517a,#b13a58);color:#fff;
  border:none;text-align:left;width:100%}
.pv-card .pv-t{font-weight:700;font-size:16px}
.pv-card .pv-s{font-size:13px;opacity:.95;margin-top:2px}
.pv-feat{list-style:none;margin:10px 0 4px}
.pv-feat li{display:flex;gap:8px;padding:8px 0;font-size:15px;border-bottom:1px solid var(--line)}
.pv-feat li:last-child{border-bottom:none}
.badge-pv{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;
  background:var(--gold);color:#fff;margin-left:6px;vertical-align:1px}

.notice{display:flex;gap:8px;align-items:flex-start;background:var(--blue-soft);
  border:1px solid var(--line);border-radius:var(--radius);padding:11px 13px;
  margin-bottom:10px;font-size:13.5px;line-height:1.55}
.notice>div{flex:1;min-width:0}
.notice .n-x{color:var(--sub);padding:0 4px;font-size:14px;flex-shrink:0}
.notice .hbtn{padding:0 4px}
.sort-sel{width:auto;flex-shrink:0;font-size:13px;padding:8px 10px;border-radius:10px}
.ng-card{border-color:var(--danger)}

.set-item{display:flex;align-items:center;width:100%;text-align:left;
  padding:15px 16px;font-size:16px;gap:10px}
.set-item+.set-item{border-top:1px solid var(--line)}
a.set-item{text-decoration:none;color:inherit}
.set-item .arr{margin-left:auto;color:var(--sub)}
.set-note{font-size:13.5px;color:var(--sub);margin:8px 4px 16px}
.card.plain{padding:0;overflow:hidden}

#lock{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:18px}
#lock.show{display:flex}
#lock .big{font-size:40px}
.dots{display:flex;gap:14px}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--accent);background:transparent}
.dot.fill{background:var(--accent)}
.pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.pad button{height:64px;font-size:24px;font-weight:600;border-radius:50%;background:var(--card);
  border:1px solid var(--line)}
.pad button:active{background:var(--accent-soft)}
.shake{animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.toast{position:fixed;left:50%;bottom:calc(100px + var(--safe-bottom));transform:translateX(-50%);
  background:var(--text);color:var(--bg);font-size:14.5px;font-weight:600;
  padding:10px 18px;border-radius:999px;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;
  white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="splash"><div class="sp-heart">💐</div>婚活デートメモ</div>

<div id="lock">
  <div class="big">🔒</div>
  <div id="lockMsg" style="font-weight:700">パスコードを入力</div>
  <div class="dots" id="lockDots"></div>
  <div class="pad" id="lockPad"></div>
</div>

<header>
  <button class="hbtn" id="backBtn" style="display:none">‹ 戻る</button>
  <h1 id="title">婚活デートメモ</h1>
</header>

<main id="main"></main>
<button class="fab" id="fab">＋</button>

<button id="adbar">
  <span class="ad-tag">広告</span>
  <span class="ad-body">ここに広告が表示されます（テスト用サンプル枠）</span>
  <span class="ad-off">非表示にする ›</span>
</button>

<nav id="tabbar">
  <button data-tab="list" class="on"><span class="ti">💐</span>お相手</button>
  <button data-tab="topics"><span class="ti">💬</span>話題</button>
  <button data-tab="my"><span class="ti">📝</span>MYメモ</button>
  <button data-tab="settings"><span class="ti">⚙️</span>設定</button>
</nav>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
'use strict';
const KEY='konkatsu_date_memo_v1';
const STATUSES=[
  {id:'active', label:'やり取り中', cls:'st-active'},
  {id:'watch',  label:'様子見',     cls:'st-watch'},
  {id:'serious',label:'真剣交際',   cls:'st-serious'},
  {id:'end',    label:'ご縁なし',   cls:'st-end'},
];
const stMap=Object.fromEntries(STATUSES.map(s=>[s.id,s]));

/* 各話題は「聞き方(q) → 相手の答え(a) → 派生質問(d)」の会話フロー形式。
   d は [タグ, そのまま使える聞き返し] の配列 */
const TOPIC_PRESETS=[
  {name:'🍀 はじめまして（1回目）',items:[
    ['a1','出身地・地元のこと',{q:'出身ってどこなんですか？',a:'◯◯です',d:[
      ['深掘り','どんな町ですか？都会？自然多め？'],['いつ','いつまで地元にいたんですか？'],
      ['なぜ','こっちに出てきたきっかけは？'],['つなぐ','おすすめの地元グルメ、今度教えてください']]}],
    ['a2','休日の過ごし方',{q:'休みの日って何してることが多いですか？',a:'◯◯してます',d:[
      ['なぜ','それが好きになったきっかけって？'],['誰と','一人でですか？友達と？'],
      ['深掘り','最近の休みで一番楽しかったのは？'],['つなぐ','今度の休み、それ一緒にやりませんか？']]}],
    ['a3','仕事の内容・やりがい',{q:'お仕事って何されてるんですか？',a:'◯◯の仕事です',d:[
      ['なぜ','その仕事を選んだきっかけは？'],['深掘り','どんな時にやりがいを感じます？'],
      ['いつ','忙しい時期っていつ頃なんですか？'],['つなぐ','忙しくなる前に、ご飯行きましょう']]}],
    ['a4','最近ハマっていること',{q:'最近ハマってるものってあります？',a:'◯◯です',d:[
      ['いつ','いつからハマってるんですか？'],['なぜ','きっかけは何だったんですか？'],
      ['どのくらい','週にどのくらいやってます？'],['つなぐ','初心者でもできます？今度教えてください']]}],
    ['a5','好きな食べ物・苦手な食べ物',{q:'好きな食べ物って何ですか？',a:'◯◯が好きです',d:[
      ['深掘り','お店で食べる派？自分で作る派？'],['どのくらい','週何回くらい食べてます？（笑）'],
      ['逆に','逆に苦手なものやアレルギーってあります？'],['つなぐ','おいしい◯◯のお店知ってるので、今度ぜひ']]}],
    ['a6','行きつけのお店・好きなカフェ',{q:'行きつけのお店とかあります？',a:'◯◯によく行きます',d:[
      ['なぜ','そのお店のどこが好きなんですか？'],['深掘り','雰囲気重視？味重視？'],
      ['誰と','いつも一人で行くんですか？'],['つなぐ','いいなあ、今度連れてってください']]}],

/* localStorage と IndexedDB に二重保存する。
   iOS Safari は放置サイトの localStorage を消すことがあるため、
   より消えにくい IndexedDB を正とし、LS は高速起動用ミラーにする */
let _idb=null;
function idbOpen(){
  if(_idb) return _idb;
  _idb=new Promise((res,rej)=>{
    const r=indexedDB.open('konkatsu-date-memo',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('kv');
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
  return _idb;
}
async function idbGet(k){
  const d=await idbOpen();
  return new Promise((res,rej)=>{
    const q=d.transaction('kv').objectStore('kv').get(k);
    q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error);
  });
}
async function idbSet(k,v){
  const d=await idbOpen();
  return new Promise((res,rej)=>{
    const t=d.transaction('kv','readwrite');
    t.objectStore('kv').put(v,k);
    t.oncomplete=()=>res(); t.onerror=()=>rej(t.error);
  });
}
function save(){
  try{ localStorage.setItem(KEY,JSON.stringify(db)); }catch(e){}
  try{ if(window.indexedDB) idbSet('db',JSON.parse(JSON.stringify(db))).catch(()=>{}); }catch(e){}
}

async function sha256(s){
  if(!(window.crypto&&crypto.subtle)) return null;
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function hashCode(c){
  const h=await sha256('datememo:'+c);
  return h||('p:'+c);
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function partner(id){ return db.partners.find(p=>p.id===id); }
function fmtDate(iso){
  if(!iso) return '';
  const [y,m,d]=iso.split('-');
  return `${y}/${Number(m)}/${Number(d)}`;
}
function stars(n){ return n?'★'.repeat(n)+'☆'.repeat(5-n):''; }
function todayISO(off){
  const t=new Date(); t.setDate(t.getDate()+(off||0));
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}
function daysUntil(iso){
  const t=new Date(); t.setHours(0,0,0,0);
  const n=Math.round((new Date(iso+'T00:00:00')-t)/86400000);
  return n<=0?'今日！':`あと${n}日`;
}
function nextUpcoming(p){
  const today=todayISO();
  const ds=p.dates.filter(d=>d.nextDate&&d.nextDate>=today).map(d=>d.nextDate).sort();
  return ds[0]||null;
}

}

      :`<div class="empty"><div class="big">💐</div>お相手がまだ登録されていません。<br>右下の「＋」から追加しましょう。
        <button class="btn btn-sub" id="addSample" style="max-width:260px;margin:18px auto 0">サンプルデータを入れてみる</button></div>`)}`;

  $main.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{filter=c.dataset.f;render();});
  $main.querySelectorAll('.p-card').forEach(c=>c.onclick=()=>nav({name:'detail',id:c.dataset.id},true));

function untalkedTopics(p){
  const out=[];
  TOPIC_PRESETS.forEach((c,ci)=>{
    if(!catUnlocked(ci)) return;
    c.items.forEach(([id,text,flow])=>{ if(!(p&&p.talked&&p.talked[id])) out.push({id,text,flow}); });
  });
  (db.myTopics||[]).forEach(t=>{ if(!(p&&p.talked&&p.talked[t.id])) out.push({id:t.id,text:t.text,note:t.note}); });
  return out;
}

function openGacha(p){
  const pool=untalkedTopics(p);
  const drawHtml=()=>{
    const picks=[...pool].sort(()=>Math.random()-.5).slice(0,3);
    if(!picks.length) return '<div class="card">引ける話題がありません。全部話しました！🎉</div>';
    return picks.map(t=>{
      const f=t.flow;
      const d=f?f.d[Math.floor(Math.random()*f.d.length)]:null;
      return `<div class="card">
        <div style="font-size:13px;color:var(--sub);font-weight:700">${f?esc(t.text):'📝 MY話題'}</div>
        <div style="font-weight:700;margin-top:2px">💬 ${esc(f?f.q:t.text)}</div>
        ${d?`<div class="fl-d" style="margin-top:8px"><span class="fl-tag">${esc(d[0])}</span><span>${esc(d[1])}</span></div>`:''}
        ${!f&&t.note?`<div class="fl-q" style="margin-top:8px;white-space:pre-wrap">📝 ${esc(t.note)}</div>`:''}
      </div>`;
    }).join('');
  };
  openSheet(`
    <h2>🎲 話題ガチャ<button class="hbtn" id="shClose">閉じる</button></h2>
    <p class="set-note" style="margin-top:0">${p?'まだ話していない話題':'解放中の話題'}からランダムに3つ引きます。</p>
    <div id="gRes">${drawHtml()}</div>
    <button class="btn btn-main" id="gAgain">もう一回引く</button>`);
  document.getElementById('shClose').onclick=()=>closeSheet(true);
  document.getElementById('gAgain').onclick=()=>{ document.getElementById('gRes').innerHTML=drawHtml(); };
}

function renderTopics(){
  const p=view.pid?partner(view.pid):null;
  if(view.pid&&!p){ view={name:'list'}; return render(); }
  $title.textContent=p?'話題チェック':'話題リスト';
  $back.style.display=p?'block':'none';
  $fab.style.display='none';
  if(p&&!p.talked) p.talked={};

  const total=allTopicCount();
  const done=p?talkedCount(p):0;
  const head=p
    ?`<div class="card"><div style="display:flex;align-items:baseline;gap:8px">
        <span style="font-weight:700">${esc(p.name)}</span>
        <span style="margin-left:auto;font-size:13px;color:var(--sub)"><b id="tDone" style="color:var(--accent-dark)">${done}</b> / ${total} 話した</span></div>
        <div class="t-progress"><div id="tBar" style="width:${total?Math.round(done/total*100):0}%"></div></div></div>`
    :`<p class="set-note" style="margin-top:2px">デート前の話題探しにどうぞ。お相手の詳細画面から開くと、話した話題にチェックを付けられます。「＋ 追加」で自分の話題も登録できます。</p>`;

  const upsell=isPremium()?'':`
    <button class="card pv-card" id="pvOpen">
      <div class="pv-t">⭐ プレミアムで話題を全種類解放</div>
      <div class="pv-s">残り${TOPIC_PRESETS.reduce((s,c,ci)=>s+(ci>0?c.items.length:0),0)}種の話題（会話の流れの例つき）＋お相手無制限＋広告なしを解放｜${PURCHASE.freeTrial?'今なら無料':PURCHASE.price+' 買い切り'}</div>
    </button>`;

  const secs=TOPIC_PRESETS.map((cat,ci)=>{
    const unlocked=catUnlocked(ci);
    const rows=catTopics(ci).map(t=>{
      const open=expandedTopics.has(t.id);
      const exp=t.flow?`<button class="t-exp ${open?'open':''}" data-x="${t.id}">▼</button>`:'';
      const sub=t.flow?`<div class="t-sub" data-sub="${t.id}" ${open?'':'hidden'}>${flowHtml(t.flow)}</div>`:'';
      let row;
      if(p&&unlocked){
        const on=!!p.talked[t.id];
        row=`<div class="t-row"><label class="t-main"><input type="checkbox" data-t="${t.id}" ${on?'checked':''}>
          <span class="t-text ${on?'done':''}">${esc(t.text)}</span></label>${exp}</div>`;
      }else{
        row=`<div class="t-row" ${t.flow&&unlocked?`data-x="${t.id}"`:''}><span class="t-text">${esc(t.text)}</span>${exp}</div>`;
      }
      return `<div class="t-item">${row}${sub}</div>`;
    }).join('');
    const title=`<div class="sec-title">${cat.name}${unlocked?'':'<span class="badge-pv">⭐ プレミアム</span>'}</div>`;
    if(unlocked) return `${title}<div class="card plain">${rows}</div>`;
    return `${title}
      <div class="card plain locked-wrap">
        <div class="locked-rows">${rows}</div>
        <button class="unlock-btn" data-unlock="1">🔒 タップして解放<small>${PURCHASE.freeTrial?'テスト期間中は無料':PURCHASE.price+' 買い切り'}</small></button>
      </div>`;
  }).join('');

  const mySec=p?`<div class="sec-title">📝 MY話題リスト<button class="hbtn" id="myAdd">＋ 追加</button></div>
    ${(db.myTopics||[]).length?`<div class="card plain">${myTopicRows(p)}</div>`
      :`<div class="card" style="color:var(--sub);font-size:14.5px">「MYメモ」タブから、話したいことを自由に追加できます。</div>`}`:'';

  const gacha=`<button class="btn btn-sub" id="gachaBtn" style="margin:0 0 8px">🎲 話題ガチャで3つ引く</button>`;
  $main.innerHTML=head+upsell+gacha+mySec+secs;
  document.getElementById('gachaBtn').onclick=()=>openGacha(p);
  const myAdd=document.getElementById('myAdd');
  if(myAdd) myAdd.onclick=()=>openMyTopicSheet(null);
  bindMyTopicEdit();
  const pv=document.getElementById('pvOpen');
  if(pv) pv.onclick=()=>openPaywall();
  $main.querySelectorAll('[data-unlock]').forEach(b=>b.onclick=()=>openPaywall());

  const refreshHead=()=>{
    if(!p) return;
    const d=talkedCount(p), tt=allTopicCount();
    const el=document.getElementById('tDone');
    if(el){
      el.textContent=d;
      el.classList.remove('num-pop'); void el.offsetWidth; el.classList.add('num-pop');
    }
    const bar=document.getElementById('tBar');
    if(bar) bar.style.width=(tt?Math.round(d/tt*100):0)+'%';
  };
  $main.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.onchange=()=>{
    if(cb.checked) p.talked[cb.dataset.t]=true; else delete p.talked[cb.dataset.t];
    cb.nextElementSibling.classList.toggle('done',cb.checked);
    save(); refreshHead();
  });
  $main.querySelectorAll('[data-x]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const id=el.dataset.x;
    const sub=$main.querySelector(`[data-sub="${id}"]`);
    if(!sub) return;
    const open=sub.hasAttribute('hidden');
    if(open){ sub.removeAttribute('hidden'); expandedTopics.add(id); }
    else{ sub.setAttribute('hidden',''); expandedTopics.delete(id); }
    const btn=$main.querySelector(`button.t-exp[data-x="${id}"]`);
    if(btn) btn.classList.toggle('open',open);
  });
}

      <div class="f-row"><label>日付 *</label><input type="date" id="fDate" value="${d?.date||iso}"></div>
    </div>
    <div class="f-row"><label>場所・プラン</label><input id="fPlace" value="${esc(d?.place||'')}" placeholder="例：表参道でランチ→散歩"></div>
    <div class="f-row"><label>手応え</label><div class="rate-in" id="fRate">${[1,2,3,4,5].map(n=>`<button data-n="${n}" class="${n<=rating?'on':''}">★</button>`).join('')}</div></div>
    <div class="f-row"><label>話したこと・内容</label><textarea id="fTopics" placeholder="例：お互いの休日の過ごし方、家族の話">${esc(d?.topics||'')}</textarea></div>
    <div class="f-row"><label>👍 良かったこと</label><textarea id="fGood" placeholder="例：店員さんへの態度が丁寧だった">${esc(d?.good||'')}</textarea></div>
    <div class="f-row"><label>🤔 気になったこと</label><textarea id="fBad" placeholder="例：会話中スマホをよく見ていた">${esc(d?.bad||'')}</textarea></div>
    <div class="f-row"><label>📌 次回の予定・宿題</label><textarea id="fNext" placeholder="例：次はおすすめの水族館へ。誕生日を聞く">${esc(d?.next||'')}</textarea></div>
    <div class="f-row"><label>📅 次回の予定日（決まっていれば）</label><input type="date" id="fNextDate" value="${d?.nextDate||''}"></div>
    <button class="btn btn-main" id="shSave">保存</button>
    ${d?`<button class="btn-danger-text" id="shDel">この記録を削除</button>`:''}
  `);
  document.getElementById('shClose').onclick=closeSheet;
  document.getElementById('fRate').querySelectorAll('button').forEach(b=>b.onclick=()=>{
    sheetDirty=true;
    const n=Number(b.dataset.n);
    rating=(rating===n)?0:n;
    document.getElementById('fRate').querySelectorAll('button').forEach(x=>
      x.classList.toggle('on',Number(x.dataset.n)<=rating));
    b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop');
  });
  document.getElementById('shSave').onclick=()=>{
    const date=document.getElementById('fDate').value;
    if(!date){ toast('日付を入力してください'); return; }
    const vals={
      date, place:document.getElementById('fPlace').value.trim(), rating,
      topics:document.getElementById('fTopics').value.trim(),
      good:document.getElementById('fGood').value.trim(),
      bad:document.getElementById('fBad').value.trim(),
      next:document.getElementById('fNext').value.trim(),
      nextDate:document.getElementById('fNextDate').value,
    };
    if(d){ Object.assign(d,vals); }
    else{ p.dates.push({id:uid(),...vals}); }
    p.updatedAt=Date.now();
    save(); closeSheet(true); render(); toast('保存しました');
  };
  const del=document.getElementById('shDel');
  if(del) del.onclick=()=>{
    if(!confirm('この記録を削除します。よろしいですか？')) return;
    p.dates=p.dates.filter(x=>x.id!==d.id);
    p.updatedAt=Date.now();
    save(); closeSheet(true); render(); toast('削除しました');
  };
}

function myTopicRows(p){
  return (db.myTopics||[]).map(t=>{
    const open=expandedTopics.has(t.id);
    const exp=t.note?`<button class="t-exp ${open?'open':''}" data-x="${t.id}">▼</button>`:'';
    const sub=t.note?`<div class="t-sub" data-sub="${t.id}" ${open?'':'hidden'}>
      <div class="fl-q" style="white-space:pre-wrap">📝 ${esc(t.note)}</div></div>`:'';
    const editBtn=`<button class="t-edit" data-edit="${t.id}">編集</button>`;
    let row;
    if(p){
      const on=!!p.talked[t.id];
      row=`<div class="t-row"><label class="t-main"><input type="checkbox" data-t="${t.id}" ${on?'checked':''}>
        <span class="t-text ${on?'done':''}">${esc(t.text)}</span></label>${editBtn}${exp}</div>`;
    }else{
      row=`<div class="t-row" ${t.note?`data-x="${t.id}"`:''}><span class="t-text">${esc(t.text)}</span>${editBtn}${exp}</div>`;
    }
    return `<div class="t-item">${row}${sub}</div>`;
  }).join('');
}
function bindMyTopicEdit(){
  $main.querySelectorAll('[data-edit]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    openMyTopicSheet(db.myTopics.find(x=>x.id===b.dataset.edit));
  });
}

function renderMyTopics(){
  $title.textContent='MYメモ';
  $back.style.display='none';
  $fab.style.display='flex';
  const rows=myTopicRows(null);
  $main.innerHTML=`
    <p class="set-note" style="margin:2px 4px 12px">「今度これを話したい」「次に聞くこと」を自由にメモ。お相手ごとの話題チェック・デート前カンペ・話題ガチャにも自動で入ります。</p>
    ${rows?`<div class="card plain">${rows}</div>`
      :`<div class="empty"><div class="big">📝</div>まだメモがありません。<br>右下の「＋」から追加しましょう。</div>`}
    ${rows?`<button class="btn btn-sub" id="myGacha" style="margin-top:12px">🎲 話題ガチャで3つ引く</button>`:''}`;
  bindMyTopicEdit();
  $main.querySelectorAll('[data-x]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const id=el.dataset.x;
    const sub=$main.querySelector(`[data-sub="${id}"]`);
    if(!sub) return;
    const open=sub.hasAttribute('hidden');
    if(open){ sub.removeAttribute('hidden'); expandedTopics.add(id); }
    else{ sub.setAttribute('hidden',''); expandedTopics.delete(id); }
    const btn=$main.querySelector(`button.t-exp[data-x="${id}"]`);
    if(btn) btn.classList.toggle('open',open);
  });
  const g=document.getElementById('myGacha');
  if(g) g.onclick=()=>openGacha(null);
}

function openMyTopicSheet(item){
  openSheet(`
    <h2>${item?'MY話題を編集':'MY話題を追加'}<button class="hbtn" id="shClose">閉じる</button></h2>
    <div class="f-row"><label>話したいこと *</label><input id="myText" value="${esc(item?.text||'')}" placeholder="例：次の連休の予定を聞く"></div>
    <div class="f-row"><label>メモ・聞き方（任意）</label><textarea id="myNote" placeholder="例：「連休どこか行きます？」→ 空いてたら水族館に誘う">${esc(item?.note||'')}</textarea></div>
    ${item?`<div class="f-row"><label>並び順</label>
      <div style="display:flex;gap:10px">
        <button class="btn btn-sub" style="margin:0" id="myUp">↑ 上へ</button>
        <button class="btn btn-sub" style="margin:0" id="myDown">↓ 下へ</button>
      </div></div>`:''}
    <button class="btn btn-main" id="mySave">保存</button>
    ${item?`<button class="btn-danger-text" id="myDel">この話題を削除</button>`:''}
  `);
  document.getElementById('shClose').onclick=closeSheet;
  document.getElementById('mySave').onclick=()=>{
    const text=document.getElementById('myText').value.trim();
    if(!text){ toast('話したいことを入力してください'); return; }
    const note=document.getElementById('myNote').value.trim();
    if(item){ item.text=text; item.note=note; }
    else{ db.myTopics.push({id:uid(),text,note}); }
    save(); closeSheet(true); render(); toast('保存しました');
  };
  if(item){
    const move=dir=>{
      const i=db.myTopics.findIndex(x=>x.id===item.id);
      const j=i+dir;
      if(i<0||j<0||j>=db.myTopics.length) return;
      [db.myTopics[i],db.myTopics[j]]=[db.myTopics[j],db.myTopics[i]];
      save(); render(); toast(dir<0?'上へ移動しました':'下へ移動しました');
    };
    document.getElementById('myUp').onclick=()=>move(-1);
    document.getElementById('myDown').onclick=()=>move(1);
    document.getElementById('myDel').onclick=()=>{
      if(!confirm(`「${item.text}」を削除しますか？`)) return;
      db.myTopics=db.myTopics.filter(x=>x.id!==item.id);
      save(); closeSheet(true); render(); toast('削除しました');
    };
  }
}

/* 購入完了メール等で案内した解除コードで機能を有効化（機種変更時の復元も兼ねる） */
function openCodeSheet(){
  openSheet(`
    <h2>🎟 解除コードを入力<button class="hbtn" id="shClose">閉じる</button></h2>
    <p class="set-note" style="margin-top:0">購入完了時に案内された解除コードを入力してください。機種変更後の復元にも使えます。</p>
    <div class="f-row"><label>解除コード</label><input id="ucode" autocomplete="off" autocapitalize="off" placeholder="例：DATEMEMO-XXXX-XXXX"></div>
    <button class="btn btn-main" id="ucodeGo">有効にする</button>`);
  document.getElementById('shClose').onclick=closeSheet;
  document.getElementById('ucodeGo').onclick=async()=>{
    const c=document.getElementById('ucode').value.trim();
    if(!c){ toast('コードを入力してください'); return; }
    const h=await sha256(c);
    if(h&&UNLOCK.premium.includes(h)){
      db.premium=true; save(); closeSheet(true); render();
      toast('プレミアムを有効にしました 🎉');
    }else{
      toast('コードが正しくありません');
    }
  };
}

/* ---------- settings ---------- */
function renderSettings(){
  $title.textContent='設定';
  $back.style.display='none';
  $fab.style.display='none';
  $main.innerHTML=`
    <div class="card plain">
      <button class="set-item" id="setPremium">⭐ プレミアム<span class="arr">${isPremium()?'有効':'未購入 ›'}</span></button>
      <button class="set-item" id="setCode">🎟 購入の復元（解除コード）<span class="arr">›</span></button>
      <button class="set-item" id="setLock">🔒 パスコードロック<span class="arr">${db.passcode?'オン ›':'オフ ›'}</span></button>
      <button class="set-item" id="setExport">📤 データを書き出す<span class="arr">機種変更・保険用 ›</span></button>
      <button class="set-item" id="setImport">📥 データを読み込む<span class="arr">復元・引っ越し用 ›</span></button>
      <button class="set-item" id="setWipe" style="color:var(--danger)">🗑 全データを削除</button>
    </div>
    <p class="set-note">データはこの端末（ブラウザ）の中にだけ保存され、外部には送信されません。そのため、アプリやサイトデータを削除するとデータも消えます。「データを書き出す」でファイルに保存しておくと、機種変更や入れ直しのときに「データを読み込む」で元に戻せます。<br><br>
    ※ パスコードは簡易的な画面ロックです。端末自体のロックも併せてご利用ください。</p>
    <div class="sec-title">アプリについて</div>
    <div class="card plain">
      <a class="set-item" href="terms.html" target="_blank" rel="noopener">📄 利用規約<span class="arr">›</span></a>
      <a class="set-item" href="privacy.html" target="_blank" rel="noopener">🔒 プライバシーポリシー<span class="arr">›</span></a>
    </div>
    <p class="set-note" style="text-align:center">婚活デートメモ v${APP_VERSION}</p>
    <input type="file" id="impFile" accept="application/json" style="display:none">
  `;

  document.getElementById('setPremium').onclick=()=>{
    if(isPremium()){
      // テスト用：解除できるようにしておく（本番では購入の復元に置き換える）
      if(confirm('プレミアムを無効に戻しますか？（テスト用）')){
        db.premium=false; save(); render(); toast('プレミアムを無効にしました');
      }
    }else openPaywall();
  };
  document.getElementById('setCode').onclick=openCodeSheet;
  document.getElementById('setLock').onclick=()=>{
    if(db.passcode){
      if(confirm('パスコードロックを解除しますか？')){
        db.passcode=null; save(); toast('ロックを解除しました'); render();
      }
    }else openPasscodeSheet();
  };
  document.getElementById('setExport').onclick=doExport;
  const fileIn=document.getElementById('impFile');
  document.getElementById('setImport').onclick=()=>fileIn.click();
  fileIn.onchange=()=>{
    const f=fileIn.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const d=JSON.parse(r.result);
        if(!d||!Array.isArray(d.partners)) throw 0;
        if(!confirm(`バックアップ（お相手${d.partners.length}名）で現在のデータを置き換えますか？`)) return;
        db=normalize(d); save(); nav({name:'list'},false); toast('読み込みました');
      }catch(e){ toast('ファイルを読み込めませんでした'); }
    };
    r.readAsText(f);
  };
  document.getElementById('setWipe').onclick=()=>{
    if(!confirm('すべてのお相手と記録を削除します。元に戻せません。よろしいですか？')) return;
    if(!confirm('本当に削除しますか？')) return;
    db={partners:[],passcode:null,custom:[],myTopics:[],premium:db.premium,
        installDismissed:db.installDismissed,firstRun:db.firstRun}; save();
    nav({name:'list'},false); toast('削除しました');
  };
}

function doExport(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='konkatsu-date-memo-backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
  db.lastBackup=Date.now(); save();
  if(view.name==='list') render();
  toast('書き出しました');
}

function openPasscodeSheet(){
  openSheet(`
    <h2>🔒 パスコードを設定<button class="hbtn" id="shClose">閉じる</button></h2>
    <div class="f-row"><label>4桁の数字</label><input id="pc1" type="password" inputmode="numeric" maxlength="4" autocomplete="off"></div>
    <div class="f-row"><label>確認のためもう一度</label><input id="pc2" type="password" inputmode="numeric" maxlength="4" autocomplete="off"></div>
    <p class="set-note">※簡易的な画面ロックです。パスコードを忘れると解除できず、データの初期化が必要になります。</p>
    <button class="btn btn-main" id="pcSave">設定する</button>`);
  document.getElementById('shClose').onclick=closeSheet;
  document.getElementById('pcSave').onclick=async()=>{
    const c1=document.getElementById('pc1').value, c2=document.getElementById('pc2').value;
    if(!/^\d{4}$/.test(c1)){ toast('4桁の数字で入力してください'); return; }
    if(c1!==c2){ toast('2回の入力が一致しません'); return; }
    db.passcode=await hashCode(c1);
    save(); closeSheet(true); render(); toast('ロックを設定しました');
  };
}

/* ---------- passcode lock ---------- */
const $lock=document.getElementById('lock');
function showLock(){
  if(!db.passcode) return;
  $lock.classList.add('show');
  let input='';
  const dots=document.getElementById('lockDots');
  const pad=document.getElementById('lockPad');
  const drawDots=()=>{ dots.innerHTML=[0,1,2,3].map(i=>`<div class="dot ${i<input.length?'fill':''}"></div>`).join(''); };
  drawDots();
  pad.innerHTML=[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>
    k===''?'<span></span>':`<button data-k="${k}">${k}</button>`).join('');
  pad.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    const k=b.dataset.k;
    if(k==='⌫'){ input=input.slice(0,-1); drawDots(); return; }
    if(input.length>=4) return;
    input+=k; drawDots();
    if(input.length===4){
      (async()=>{
        const ok=input===db.passcode||(await hashCode(input))===db.passcode;
        if(ok){ $lock.classList.remove('show'); }
        else{
          dots.classList.add('shake');
          setTimeout(()=>{ dots.classList.remove('shake'); input=''; drawDots(); },350);
        }
      })();
    }
  });
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden' && db.passcode) $lock.classList.add('show');
  if(document.visibilityState==='visible' && db.passcode && $lock.classList.contains('show')) showLock();
});

if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
  const hadController=!!navigator.serviceWorker.controller;
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
  if(hadController){
    let notified=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(!notified){ notified=true; toast('アプリを最新版に更新しました'); }
    });
  }
}

history.replaceState(view,'');
showLock();
render();

setTimeout(()=>{
  const sp=document.getElementById('splash');
  sp.classList.add('hide');
  setTimeout(()=>sp.remove(),400);
},450);

/* 起動後に IndexedDB（正）を読み、LS が消えていた場合などに復元する */
(async()=>{
  try{
    if(window.indexedDB){
      const d=await idbGet('db');
      if(d&&Array.isArray(d.partners)&&JSON.stringify(d)!==JSON.stringify(db)){
        db=normalize(d); render();
        if(db.passcode&&!$lock.classList.contains('show')) showLock();
      }
    }
  }catch(e){}
  if(!db.firstRun) db.firstRun=Date.now();
  if(db.passcode&&/^\d{4}$/.test(db.passcode)) db.passcode=await hashCode(db.passcode);
  save();
  try{ if(navigator.storage&&navigator.storage.persist) navigator.storage.persist(); }catch(e){}
})();
</script>
