# XcodeGen 用プロジェクト定義
# Mac: `brew install xcodegen && cd shortlab && xcodegen` で ShortLab.xcodeproj が生成される。
# CI: .github/workflows/shortlab-build.yml が push のたびにクラウドのMacでビルド確認する。
# Info.plist は GENERATE_INFOPLIST_FILE + INFOPLIST_KEY_* で自動生成(手動追加は不要)。
name: ShortLab
options:
  bundleIdPrefix: com.kuromakuaikin
  deploymentTarget:
    iOS: "17.0"
targets:
  ShortLab:
    type: application
    platform: iOS
    sources: [ShortLab]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kuromakuaikin.shortlab
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: かんたん動画
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 編集する動画を選ぶために使用します
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: 作った動画を写真に保存するために使用します
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: 1
        GENERATE_INFOPLIST_FILE: YES
