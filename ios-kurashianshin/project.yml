# XcodeGen 用プロジェクト定義（任意）
# `brew install xcodegen && cd ios-kurashianshin && xcodegen` で KurashiAnshinBook.xcodeproj が生成される。
# XcodeGen を使わない場合は README.md の手動セットアップ手順を参照。
name: KurashiAnshinBook
options:
  bundleIdPrefix: com.kuromakuaikin
  deploymentTarget:
    iOS: "17.0"
targets:
  KurashiAnshinBook:
    type: application
    platform: iOS
    sources: [KurashiAnshinBook]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kuromakuaikin.kurashianshin
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: 暮らしの安心手帳
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: 1
        GENERATE_INFOPLIST_FILE: YES
