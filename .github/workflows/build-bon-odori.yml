name: 盆踊りナビ自動ビルド

# events.json か build.py が変更されたら、個別ページと sitemap を自動再生成してコミットする。
# これにより管理者は GitHub の Web 画面（スマホ可）で events.json を編集するだけでよい。
on:
  push:
    paths:
      - "bon-odori/events.json"
      - "bon-odori/build.py"

permissions:
  contents: write

concurrency:
  group: build-bon-odori-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: 個別ページ・sitemap を生成
        run: python3 bon-odori/build.py

      - name: 変更があればコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- bon-odori/e
          if git ls-files --error-unmatch bon-odori/sitemap.xml >/dev/null 2>&1 || [ -e bon-odori/sitemap.xml ]; then
            git add -A -- bon-odori/sitemap.xml
          fi
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "自動ビルド: イベントページと sitemap を再生成"
            git push
          fi
