# ShortLab のビルド確認をクラウドのMac(GitHub Actions)で行う。
# 手元にMacがなくてもコンパイルエラーを検出できる。
# 署名なしのシミュレータ向けビルドなので、Apple Developer の証明書は不要。
name: ShortLab build check

on:
  push:
    paths:
      - "shortlab/**"
      - ".github/workflows/shortlab-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Generate Xcode project (XcodeGen)
        run: |
          brew install xcodegen
          cd shortlab
          xcodegen generate

      - name: Build for iOS Simulator (unsigned)
        run: |
          cd shortlab
          xcodebuild build \
            -project ShortLab.xcodeproj \
            -scheme ShortLab \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO
