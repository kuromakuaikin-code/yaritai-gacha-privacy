# XcodeGen 用プロジェクト定義
# `brew install xcodegen && cd genpou && xcodegen` で Genpou.xcodeproj が生成される。
# XcodeGen を使わない場合は README.md の手動セットアップ手順を参照。
name: Genpou
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
targets:
  Genpou:
    type: application
    platform: iOS
    sources:
      - Genpou
      - path: Genpou.storekit
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.genpou
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: 現報
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: 施工状況を記録するためカメラを使用します。
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 報告書用の写真を選択するため写真ライブラリを使用します。
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: 1
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Genpou:
    build:
      targets:
        Genpou: all
    run:
      config: Debug
      storeKitConfiguration: Genpou.storekit
