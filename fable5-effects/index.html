<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>гӮІгғјгғ гӮЁгғ•гӮ§гӮҜгғҲ гғ—гғ¬гғ“гғҘгғј вҖ” Fable 5 жҖ§иғҪиӘҝжҹ» 10</title>
</head>
<body>
<style>
  :root{
    --bg:#05070c;
    --panel:rgba(12,18,29,.86);
    --line:rgba(110,150,210,.18);
    --text:#dce6f2;
    --dim:#8494ab;
    --accent:#55d6ff;
  }
  html,body{height:100%;}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;
    overflow:hidden;-webkit-user-select:none;user-select:none;
  }
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;}
  #flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .45s ease-out;}
  .hud{position:fixed;z-index:10;}
  .panel{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }
  #title{top:max(10px,env(safe-area-inset-top));left:12px;padding:10px 14px;}
  #title h1{margin:0;font-size:14px;font-weight:700;letter-spacing:.04em;}
  #title h1 span{color:var(--accent);}
  #title p{margin:3px 0 0;font-size:10.5px;color:var(--dim);letter-spacing:.06em;}
  #stats{
    top:max(10px,env(safe-area-inset-top));right:12px;padding:8px 12px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;
    color:var(--dim);text-align:right;line-height:1.6;font-variant-numeric:tabular-nums;
  }
  #stats b{color:var(--text);font-weight:600;}
  #bar{
    left:0;right:0;bottom:0;padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:8px;
    background:linear-gradient(to top,rgba(5,7,12,.92),rgba(5,7,12,0));
  }
  #fxrow{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
  #fxrow::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;padding:9px 16px;border-radius:999px;cursor:pointer;
    background:var(--panel);border:1px solid var(--line);color:var(--text);
    font-size:13px;font-weight:600;letter-spacing:.02em;font-family:inherit;
  }
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .chip.on{border-color:var(--accent);color:var(--accent);box-shadow:0 0 14px rgba(85,214,255,.35) inset,0 0 10px rgba(85,214,255,.18);}
  #subrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .mini{
    padding:6px 11px;border-radius:8px;cursor:pointer;
    background:var(--panel);border:1px solid var(--line);color:var(--dim);
    font-size:11px;font-weight:600;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  .mini:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .mini.on{color:var(--accent);border-color:var(--accent);}
  #note{margin-left:auto;font-size:10px;color:var(--dim);letter-spacing:.03em;text-align:right;}
  @media (max-width:520px){ #note{display:none;} #title p{max-width:52vw;} }
</style>

<canvas id="gl"></canvas>
<div id="flash"></div>

<div class="hud panel" id="title">
  <h1>GAME FX PREVIEW <span>пјҸ Fable 5 жҖ§иғҪиӘҝжҹ» 10</span></h1>
  <p>гғўгғҮгғ«гғ»гғҶгӮҜгӮ№гғҒгғЈгғ»гӮЁгғ•гӮ§гӮҜгғҲгҒҜгҒҷгҒ№гҒҰгӮігғјгғүгҒ§жүӢз¶ҡгҒҚз”ҹжҲҗ</p>
</div>

<div class="hud panel" id="stats">
  FPS <b id="fps">--</b><br>
  зІ’еӯҗ <b id="pc">0</b>
</div>

<div class="hud" id="bar">
  <div id="fxrow" role="tablist" aria-label="гӮЁгғ•гӮ§гӮҜгғҲйҒёжҠһ"></div>
  <div id="subrow">
    <button class="mini" id="pause" aria-label="дёҖжҷӮеҒңжӯў">вҸё еҒңжӯў</button>
    <button class="mini spd" data-s="0.25">0.25Г—</button>
    <button class="mini spd" data-s="0.5">0.5Г—</button>
    <button class="mini spd on" data-s="1">1Г—</button>
    <span id="note">гғүгғ©гғғгӮ°гҒ§еӣһи»ў / гғ”гғігғҒгғ»гғӣгӮӨгғјгғ«гҒ§гӮәгғјгғ </span>
  </div>
</div>

<script>
'use strict';
/* =========================================================
   гӮІгғјгғ гӮЁгғ•гӮ§гӮҜгғҲ гғ—гғ¬гғ“гғҘгғј
   - 3DгӮёгӮӘгғЎгғҲгғӘ: гӮігғјгғүгҒ§з”ҹжҲҗпјҲBlender MCP гҒ®д»Јжӣҝпјү
   - гғҶгӮҜгӮ№гғҒгғЈ:   Canvas 2D гҒ§жүӢз¶ҡгҒҚз”ҹжҲҗпјҲGPT image 2 гҒ®д»Јжӣҝпјү
   - жҸҸз”»:         зҙ гҒ® WebGLпјҲгғ©гӮӨгғ–гғ©гғӘдёҚдҪҝз”Ёпјү
   ========================================================= */

var canvas = document.getElementById('gl');
var gl = canvas.getContext('webgl', {alpha:false, antialias:true}) ||
         canvas.getContext('experimental-webgl');
if(!gl){ document.getElementById('title').innerHTML = '<h1>WebGL гҒҢеҲ©з”ЁгҒ§гҒҚгҒҫгҒӣгӮ“</h1>'; throw new Error('no webgl'); }

/* ---------- е°ҸгҒ•гҒӘж•°еӯҰ ---------- */
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(x,a,b){ return x<a?a:(x>b?b:x); }
function rand(a,b){ return a+Math.random()*(b-a); }

function mat4Perspective(fovy,aspect,near,far){
  var f=1/Math.tan(fovy/2), nf=1/(near-far);
  return [f/aspect,0,0,0, 0,f,0,0, 0,0,(far+near)*nf,-1, 0,0,2*far*near*nf,0];
}
function mat4LookAt(eye,c){
  var zx=eye[0]-c[0],zy=eye[1]-c[1],zz=eye[2]-c[2];
  var zl=1/Math.hypot(zx,zy,zz); zx*=zl; zy*=zl; zz*=zl;
  var xx=zz, xz=-zx; // cross(up=(0,1,0), z)
  var xl=1/(Math.hypot(xx,xz)||1); xx*=xl; xz*=xl;
  var yx=zy*xz, yy=zz*xx-zx*xz, yz=-zy*xx; // cross(z,x)
  return [xx,yx,zx,0, 0,yy,zy,0, xz,yz,zz,0,
          -(xx*eye[0]+xz*eye[2]), -(yx*eye[0]+yy*eye[1]+yz*eye[2]),
          -(zx*eye[0]+zy*eye[1]+zz*eye[2]), 1];
}
function mat4Mul(a,b){
  var o=new Array(16);
  for(var i=0;i<4;i++)for(var j=0;j<4;j++){
    o[j*4+i]=a[i]*b[j*4]+a[4+i]*b[j*4+1]+a[8+i]*b[j*4+2]+a[12+i]*b[j*4+3];
  }
  return o;
}

/* ---------- гӮ·гӮ§гғјгғҖ ---------- */
function makeProgram(vs,fs){
  function sh(type,src){
    var s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
    return s;
  }
  var p=gl.createProgram();
  gl.attachShader(p,sh(gl.VERTEX_SHADER,vs));
  gl.attachShader(p,sh(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  return p;
}

var progPoint = makeProgram(
  'attribute vec3 aPos; attribute float aSize; attribute vec4 aColor; attribute float aRot;'+
  'uniform mat4 uVP; uniform float uScale;'+
  'varying vec4 vColor; varying float vRot;'+
  'void main(){'+
  '  gl_Position = uVP * vec4(aPos,1.0);'+
  '  gl_PointSize = clamp(uScale * aSize / max(gl_Position.w, 0.001), 1.0, 512.0);'+
  '  vColor = aColor; vRot = aRot;'+
  '}',
  'precision mediump float;'+
  'uniform sampler2D uTex;'+
  'varying vec4 vColor; varying float vRot;'+
  'void main(){'+
  '  vec2 c = gl_PointCoord - 0.5;'+
  '  float s = sin(vRot), co = cos(vRot);'+
  '  vec2 uv = vec2(c.x*co - c.y*s, c.x*s + c.y*co) + 0.5;'+
  '  vec4 t = texture2D(uTex, uv);'+
  '  gl_FragColor = t * vec4(vColor.rgb * vColor.a, vColor.a);'+
  '}'
);

var progMesh = makeProgram(
  'attribute vec3 aPos; attribute vec2 aUV; attribute vec4 aColor;'+
  'uniform mat4 uVP;'+
  'varying vec2 vUV; varying vec4 vColor;'+
  'void main(){ gl_Position = uVP * vec4(aPos,1.0); vUV = aUV; vColor = aColor; }',
  'precision mediump float;'+
  'uniform sampler2D uTex;'+
  'varying vec2 vUV; varying vec4 vColor;'+
  'void main(){'+
  '  vec4 t = texture2D(uTex, vUV);'+
  '  gl_FragColor = t * vec4(vColor.rgb * vColor.a, vColor.a);'+
  '}'
);

// гғ©гӮӨгғҶгӮЈгғігӮ°д»ҳгҒҚ3DгғўгғҮгғ«з”ЁпјҲгӮӯгғЈгғ©гӮҜгӮҝгғјпјү
var progLit = makeProgram(
  'attribute vec3 aPos; attribute vec3 aNrm; attribute vec3 aCol;'+
  'uniform mat4 uVP; uniform vec3 uOff;'+
  'varying vec3 vN; varying vec3 vC;'+
  'void main(){ gl_Position = uVP * vec4(aPos + uOff, 1.0); vN = aNrm; vC = aCol; }',
  'precision mediump float;'+
  'varying vec3 vN; varying vec3 vC;'+
  'void main(){'+
  '  vec3 n = normalize(vN);'+
  '  float d = dot(n, normalize(vec3(.45,.8,.55))) * .5 + .5;'+  // гғҸгғјгғ•гғ©гғігғҗгғјгғҲ
  '  d = pow(d, 1.35);'+
  '  vec3 col = vC * (.3 + .72 * d);'+
  '  col += vC * vec3(.9,.25,.32) * max(dot(n, normalize(vec3(-.3,-.6,.4))), 0.0) * .3;'+ // з·ӢиүІгҒ®з…§гӮҠиҝ”гҒ—
  '  gl_FragColor = vec4(col, 1.0);'+
  '}'
);

/* ---------- жүӢз¶ҡгҒҚз”ҹжҲҗгғҶгӮҜгӮ№гғҒгғЈпјҲGPT image 2 гҒ®д»Јжӣҝпјү ---------- */
function canvasTex(size, draw){
  var c=document.createElement('canvas'); c.width=c.height=size;
  draw(c.getContext('2d'), size);
  var t=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,t);
  gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL,true);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,c);
  gl.generateMipmap(gl.TEXTURE_2D);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR_MIPMAP_LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  return t;
}

// гӮ„гӮҸгӮүгҒӢгҒ„е…үгҒ®зІ’
var texSoft = canvasTex(128,function(x,s){
  var g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(.4,'rgba(255,255,255,.45)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g; x.fillRect(0,0,s,s);
});

// еҚҒеӯ—гғ•гғ¬гӮўд»ҳгҒҚгҒ®гҒҚгӮүгӮҒгҒҚ
var texFlare = canvasTex(128,function(x,s){
  var m=s/2;
  var g=x.createRadialGradient(m,m,0,m,m,m*.3);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g; x.fillRect(0,0,s,s);
  function beam(rot){
    x.save(); x.translate(m,m); x.rotate(rot);
    var lg=x.createLinearGradient(-m,0,m,0);
    lg.addColorStop(0,'rgba(255,255,255,0)');
    lg.addColorStop(.5,'rgba(255,255,255,.9)');
    lg.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=lg; x.fillRect(-m,-s*.03,s,s*.06); x.restore();
  }
  beam(0); beam(Math.PI/2);
});

// гӮӮгҒҸгӮӮгҒҸгҒ—гҒҹз…ҷ
var texSmoke = canvasTex(128,function(x,s){
  for(var i=0;i<7;i++){
    var px=s/2+rand(-s*.16,s*.16), py=s/2+rand(-s*.16,s*.16), r=rand(s*.18,s*.3);
    var g=x.createRadialGradient(px,py,0,px,py,r);
    g.addColorStop(0,'rgba(255,255,255,.22)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=g; x.fillRect(0,0,s,s);
  }
});

// иЎқж’ғжіўгғ»е…үгҒ®гғӘгғігӮ°
var texRing = canvasTex(256,function(x,s){
  var m=s/2;
  var g=x.createRadialGradient(m,m,0,m,m,m);
  g.addColorStop(0,'rgba(255,255,255,0)');
  g.addColorStop(.62,'rgba(255,255,255,0)');
  g.addColorStop(.8,'rgba(255,255,255,1)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g; x.fillRect(0,0,s,s);
});

// йӯ”жі•йҷЈпјҲеҶҶз’°пјӢе…ӯиҠ’жҳҹпјӢгғ«гғјгғійўЁгӮ°гғӘгғ•пјү
var texRune = canvasTex(512,function(x,s){
  var m=s/2;
  x.strokeStyle='rgba(255,255,255,.95)'; x.lineCap='round';
  function circle(r,w,a){
    x.globalAlpha=a; x.lineWidth=w;
    x.beginPath(); x.arc(m,m,r,0,Math.PI*2); x.stroke();
  }
  circle(238,7,1); circle(224,2,.8); circle(150,3,.9); circle(60,2.5,.9);
  // е…ӯиҠ’жҳҹ
  x.globalAlpha=.85; x.lineWidth=3;
  for(var tri=0;tri<2;tri++){
    x.beginPath();
    for(var k=0;k<=3;k++){
      var a=tri*Math.PI/3 + k*(Math.PI*2/3) - Math.PI/2;
      var px=m+Math.cos(a)*148, py=m+Math.sin(a)*148;
      if(k===0) x.moveTo(px,py); else x.lineTo(px,py);
    }
    x.stroke();
  }
  // зӣ®зӣӣгӮҠ
  x.globalAlpha=.7; x.lineWidth=2;
  for(var i=0;i<48;i++){
    var a2=i/48*Math.PI*2, r1=224, r2=(i%4===0)?208:216;
    x.beginPath();
    x.moveTo(m+Math.cos(a2)*r1, m+Math.sin(a2)*r1);
    x.lineTo(m+Math.cos(a2)*r2, m+Math.sin(a2)*r2);
    x.stroke();
  }
  // гғ«гғјгғійўЁгӮ°гғӘгғ•пјҲгғ©гғігғҖгғ гҒӘгӮ№гғҲгғӯгғјгӮҜпјү
  x.globalAlpha=.9; x.lineWidth=2.5;
  for(var gI=0;gI<20;gI++){
    var ga=gI/20*Math.PI*2;
    x.save();
    x.translate(m+Math.cos(ga)*185, m+Math.sin(ga)*185);
    x.rotate(ga+Math.PI/2);
    x.beginPath();
    var nStroke=2+((gI*7)%3);
    for(var sI=0;sI<=nStroke;sI++){
      var vx=((gI*13+sI*29)%17)/17*16-8, vy=((gI*31+sI*11)%19)/19*20-10;
      if(sI===0) x.moveTo(vx,vy); else x.lineTo(vx,vy);
    }
    x.stroke();
    x.restore();
  }
  // е°ҸеҶҶ
  x.globalAlpha=.8; x.lineWidth=2.5;
  for(var c6=0;c6<6;c6++){
    var a6=c6/6*Math.PI*2-Math.PI/2;
    x.beginPath(); x.arc(m+Math.cos(a6)*148, m+Math.sin(a6)*148, 16, 0, Math.PI*2); x.stroke();
  }
});

// ж··жІҢйӯ”жі•гҒ®йҷЈпјҲгӮ№гӮ«гғјгғ¬гғғгғҲгғ»гӮҰгӮЈгғғгғҒйўЁпјҡи§’гҒ°гҒЈгҒҹгӮ№гғ‘гӮӨгӮҜгҒЁе№ҫдҪ•еӯҰжЁЎж§ҳпјү
var texChaos = canvasTex(512,function(x,s){
  var m=s/2;
  x.strokeStyle='rgba(255,255,255,.95)'; x.fillStyle='rgba(255,255,255,.8)'; x.lineCap='round';
  function circle(r,w,a){
    x.globalAlpha=a; x.lineWidth=w;
    x.beginPath(); x.arc(m,m,r,0,Math.PI*2); x.stroke();
  }
  circle(240,6,1); circle(224,2,.75); circle(126,3,.9); circle(58,2,.85);
  // еӨ–еҗ‘гҒҚгҒ®гӮ№гғ‘гӮӨгӮҜпјҲ16жң¬пјү
  x.globalAlpha=.85;
  for(var i=0;i<16;i++){
    var a=i/16*Math.PI*2;
    x.beginPath();
    x.moveTo(m+Math.cos(a-.055)*140, m+Math.sin(a-.055)*140);
    x.lineTo(m+Math.cos(a)*214,       m+Math.sin(a)*214);
    x.lineTo(m+Math.cos(a+.055)*140, m+Math.sin(a+.055)*140);
    x.closePath(); x.fill();
  }
  // гӮёгӮ°гӮ¶гӮ°гҒ®8иҠ’жҳҹ
  x.globalAlpha=.8; x.lineWidth=2.5;
  x.beginPath();
  for(var k=0;k<=16;k++){
    var a2=k/16*Math.PI*2, r2=(k%2===0)?122:70;
    var px=m+Math.cos(a2)*r2, py=m+Math.sin(a2)*r2;
    if(k===0) x.moveTo(px,py); else x.lineTo(px,py);
  }
  x.stroke();
  // еҶ…еҒҙгҒ®е…ӯи§’еҪў
  x.globalAlpha=.7; x.lineWidth=2;
  x.beginPath();
  for(var h=0;h<=6;h++){
    var a3=h/6*Math.PI*2+Math.PI/6;
    var hx=m+Math.cos(a3)*96, hy=m+Math.sin(a3)*96;
    if(h===0) x.moveTo(hx,hy); else x.lineTo(hx,hy);
  }
  x.stroke();
});

// гӮ№гӮ«гғјгғ¬гғғгғҲгҒ®йЎ”пјҲзӣ®гғ»зңүгғ»еҸЈгғ»й ¬зҙ…гҒ®гғҮгӮ«гғјгғ«пјү
var texFace = canvasTex(256,function(x,s){
  function eye(cx){
    // гӮўгӮӨгғ©гӮӨгғі
    x.fillStyle='#241019';
    x.beginPath(); x.ellipse(cx,122,18,25,0,0,Math.PI*2); x.fill();
    // зҙ…гҒ„зһі
    var g=x.createRadialGradient(cx,114,2,cx,124,20);
    g.addColorStop(0,'#ff5c86'); g.addColorStop(.55,'#d6336b'); g.addColorStop(1,'#7c1233');
    x.fillStyle=g;
    x.beginPath(); x.ellipse(cx,124,13.5,20,0,0,Math.PI*2); x.fill();
    // зһіеӯ”
    x.fillStyle='#4a0a1e';
    x.beginPath(); x.ellipse(cx,127,5.5,10,0,0,Math.PI*2); x.fill();
    // гғҸгӮӨгғ©гӮӨгғҲ
    x.fillStyle='rgba(255,255,255,.95)';
    x.beginPath(); x.arc(cx-5,112,5,0,Math.PI*2); x.fill();
    x.fillStyle='rgba(255,255,255,.5)';
    x.beginPath(); x.arc(cx+5,132,2.5,0,Math.PI*2); x.fill();
  }
  eye(86); eye(170);
  // зңүпјҲиҮӘдҝЎгҒӮгӮҠгҒ’гҒ«е°‘гҒ—гҒӨгӮҠдёҠгҒ’пјү
  x.strokeStyle='#a06a24'; x.lineWidth=4.5; x.lineCap='round';

/* ---------- гғ‘гғјгғҶгӮЈгӮҜгғ«гӮ·гӮ№гғҶгғ  ---------- */
var STRIDE=9; // pos3 + size1 + color4 + rot1
function ParticleSystem(tex, additive, cap){
  this.tex=tex; this.additive=additive; this.cap=cap||2000;
  this.list=[];
  this.buf=gl.createBuffer();
  this.data=new Float32Array(this.cap*STRIDE);
}
ParticleSystem.prototype.spawn=function(p){
  if(this.list.length>=this.cap) return;
  p.age=0;
  p.rot=p.rot||0; p.rotV=p.rotV||0;
  p.g=p.g||0; p.drag=p.drag||0;
  this.list.push(p);
};
ParticleSystem.prototype.update=function(dt){
  var L=this.list;
  for(var i=L.length-1;i>=0;i--){
    var p=L[i];
    p.age+=dt;
    if(p.age>=p.life){ L[i]=L[L.length-1]; L.pop(); continue; }
    if(p.orbit){
      p.ang+=p.angV*dt;
      p.r+=(p.vr||0)*dt;
      p.x=p.cx+Math.cos(p.ang)*p.r;
      p.z=p.cz+Math.sin(p.ang)*p.r;
      p.y+=p.vy*dt;
    }else{
      p.vy+=p.g*dt;
      if(p.drag){
        var k=Math.max(0,1-p.drag*dt);
        p.vx*=k; p.vy*=k; p.vz*=k;
      }
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt;
    }
    p.rot+=p.rotV*dt;
  }
};
function evalStops(stops,t,out){
  var n=stops.length;
  if(t<=stops[0][0]){ var s0=stops[0]; out[0]=s0[1];out[1]=s0[2];out[2]=s0[3];out[3]=s0[4]; return; }
  for(var i=1;i<n;i++){
    if(t<=stops[i][0]){
      var a=stops[i-1], b=stops[i], f=(t-a[0])/(b[0]-a[0]);
      out[0]=lerp(a[1],b[1],f); out[1]=lerp(a[2],b[2],f);
      out[2]=lerp(a[3],b[3],f); out[3]=lerp(a[4],b[4],f);
      return;
    }
  }
  var e=stops[n-1]; out[0]=e[1];out[1]=e[2];out[2]=e[3];out[3]=e[4];
}
var _col=[0,0,0,0];
ParticleSystem.prototype.draw=function(loc){
  var n=this.list.length;
  if(!n) return;
  var d=this.data;
  for(var i=0;i<n;i++){
    var p=this.list[i], t=p.age/p.life, o=i*STRIDE;
    d[o]=p.x; d[o+1]=p.y; d[o+2]=p.z;
    d[o+3]=lerp(p.size0,p.size1,t);
    evalStops(p.stops,t,_col);
    d[o+4]=_col[0]; d[o+5]=_col[1]; d[o+6]=_col[2]; d[o+7]=_col[3];
    d[o+8]=p.rot;
  }
  gl.blendFunc(gl.ONE, this.additive?gl.ONE:gl.ONE_MINUS_SRC_ALPHA);
  gl.bindTexture(gl.TEXTURE_2D,this.tex);
  gl.bindBuffer(gl.ARRAY_BUFFER,this.buf);
  gl.bufferData(gl.ARRAY_BUFFER,d.subarray(0,n*STRIDE),gl.DYNAMIC_DRAW);
  gl.vertexAttribPointer(loc.aPos,3,gl.FLOAT,false,STRIDE*4,0);
  gl.vertexAttribPointer(loc.aSize,1,gl.FLOAT,false,STRIDE*4,12);
  gl.vertexAttribPointer(loc.aColor,4,gl.FLOAT,false,STRIDE*4,16);
  gl.vertexAttribPointer(loc.aRot,1,gl.FLOAT,false,STRIDE*4,32);
  gl.drawArrays(gl.POINTS,0,n);
};

/* ---------- еӢ•зҡ„гғЎгғғгӮ·гғҘпјҲжқҝгғқгғӘз”Ёпјү ---------- */
var MSTRIDE=9; // pos3 + uv2 + color4
function DynMesh(tex, additive, capQuads){
  this.tex=tex; this.additive=additive;
  this.buf=gl.createBuffer();
  this.data=new Float32Array((capQuads||64)*6*MSTRIDE);
  this.n=0;
}
DynMesh.prototype.begin=function(){ this.n=0; };
DynMesh.prototype.vert=function(x,y,z,u,v,r,g,b,a){
  var o=this.n*MSTRIDE, d=this.data;
  if(o+MSTRIDE>d.length) return;
  d[o]=x;d[o+1]=y;d[o+2]=z;d[o+3]=u;d[o+4]=v;d[o+5]=r;d[o+6]=g;d[o+7]=b;d[o+8]=a;
  this.n++;
};
// еӣӣйҡ… [p0,p1,p2,p3]пјҲp0-p1-p2 / p0-p2-p3пјүиүІгҒҜ4й ӮзӮ№гҒ¶гӮ“
DynMesh.prototype.quad=function(p,c){
  var uv=[[0,1],[1,1],[1,0],[0,0]];
  var idx=[0,1,2, 0,2,3];
  for(var k=0;k<6;k++){
    var i=idx[k];
    this.vert(p[i][0],p[i][1],p[i][2],uv[i][0],uv[i][1],c[i][0],c[i][1],c[i][2],c[i][3]);
  }
};
DynMesh.prototype.flatQuad=function(cx,cy,cz,r,ang,col){
  var c=Math.cos(ang)*r, s=Math.sin(ang)*r;
  this.quad(
    [[cx-c+s,cy,cz-s-c],[cx+c+s,cy,cz+s-c],[cx+c-s,cy,cz+s+c],[cx-c-s,cy,cz-s+c]],
    [col,col,col,col]
  );
};
DynMesh.prototype.draw=function(loc){
  if(!this.n) return;
  gl.blendFunc(gl.ONE, this.additive?gl.ONE:gl.ONE_MINUS_SRC_ALPHA);
  gl.bindTexture(gl.TEXTURE_2D,this.tex);
  gl.bindBuffer(gl.ARRAY_BUFFER,this.buf);
  gl.bufferData(gl.ARRAY_BUFFER,this.data.subarray(0,this.n*MSTRIDE),gl.DYNAMIC_DRAW);
  gl.vertexAttribPointer(loc.aPos,3,gl.FLOAT,false,MSTRIDE*4,0);
  gl.vertexAttribPointer(loc.aUV,2,gl.FLOAT,false,MSTRIDE*4,12);
  gl.vertexAttribPointer(loc.aColor,4,gl.FLOAT,false,MSTRIDE*4,20);
  gl.drawArrays(gl.TRIANGLES,0,this.n);
};

// гӮ«гғЎгғ©гҒ«жӯЈеҜҫгҒҷгӮӢеӣһи»ўгҒҷгӮӢжқҝгғқгғӘпјҲе®ҷгҒ«жө®гҒӢгҒ¶йӯ”жі•йҷЈз”Ёпјү
function camFacingQuad(mesh, cx,cy,cz, r, rot, col){
  var cd=Math.cos(cam.pitch)*cam.dist, sd=Math.sin(cam.pitch)*cam.dist;
  var nx=Math.sin(cam.yaw)*cd-cx, ny=sd+.6-cy, nz=Math.cos(cam.yaw)*cd-cz;
  var nl=1/(Math.hypot(nx,ny,nz)||1); nx*=nl; ny*=nl; nz*=nl;
  var ax=nz, az=-nx, al=1/(Math.hypot(ax,az)||1); ax*=al; az*=al; // e1=cross(up,n)
  var bx=ny*az, by=nz*ax-nx*az, bz=-ny*ax;                        // e2=cross(n,e1)
  var c=Math.cos(rot), s=Math.sin(rot);
  var ux=(c*ax+s*bx)*r, uy=s*by*r, uz=(c*az+s*bz)*r;
  var vx=(-s*ax+c*bx)*r, vy=c*by*r, vz=(-s*az+c*bz)*r;
  mesh.quad(
    [[cx-ux-vx,cy-uy-vy,cz-uz-vz],[cx+ux-vx,cy+uy-vy,cz+uz-vz],
     [cx+ux+vx,cy+uy+vy,cz+uz+vz],[cx-ux+vx,cy-uy+vy,cz-uz+vz]],
    [col,col,col,col]
  );
}

/* ---------- гӮ№гӮ«гғјгғ¬гғғгғҲгҒ®3DгғўгғҮгғ«пјҲгӮӯгғЈгғ©гӮҜгӮҝгғјгӮ·гғјгғҲжә–жӢ гғ»е…ЁйғЁгӮігғјгғүз”ҹжҲҗпјү ---------- */
function buildWitch(){
  var V=[];
  function vert(px,py,pz,nx,ny,nz,c){ V.push(px,py,pz,nx,ny,nz,c[0],c[1],c[2]); }
  // жҘ•еҶҶзҗғ
  function sphere(cx,cy,cz,rx,ry,rz,seg,ring,c){
    for(var j=0;j<ring;j++){
      var t0=j/ring*Math.PI, t1=(j+1)/ring*Math.PI;
      for(var i=0;i<seg;i++){
        var p0=i/seg*2*Math.PI, p1=(i+1)/seg*2*Math.PI;
        var pts=[[t0,p0],[t1,p0],[t1,p1],[t0,p0],[t1,p1],[t0,p1]];
        for(var k=0;k<6;k++){
          var th=pts[k][0], ph=pts[k][1];
          var sx=Math.sin(th)*Math.cos(ph), sy=Math.cos(th), sz=Math.sin(th)*Math.sin(ph);
          var nx=sx/rx, ny=sy/ry, nz=sz/rz, nl=1/Math.hypot(nx,ny,nz);
          vert(cx+sx*rx, cy+sy*ry, cz+sz*rz, nx*nl, ny*nl, nz*nl, c);
        }
      }
    }
  }
  // Yи»ёгҒҫгӮҸгӮҠгҒ®еҶҶйҢҗеҸ°пјҲйғЁеҲҶеј§еҜҫеҝңпјҡгӮ№гӮ«гғјгғҲгғ»гғһгғігғҲгғ»еёҪеӯҗпјү
  function cone(cx,cz,y0,r0,y1,r1,a0,a1,seg,c){
    var dr=r1-r0, dy=y1-y0, nl=1/(Math.hypot(dy,dr)||1);
    var nr=dy*nl, nyc=-dr*nl;
    for(var i=0;i<seg;i++){
      var t0=lerp(a0,a1,i/seg), t1=lerp(a0,a1,(i+1)/seg);
      var pts=[[t0,y0,r0],[t1,y0,r0],[t1,y1,r1],[t0,y0,r0],[t1,y1,r1],[t0,y1,r1]];
      for(var k=0;k<6;k++){
        var a=pts[k][0], y=pts[k][1], r=pts[k][2];
        vert(cx+Math.cos(a)*r, y, cz+Math.sin(a)*r, Math.cos(a)*nr, nyc, Math.sin(a)*nr, c);
      }
    }
  }
  // д»»ж„Ҹ2зӮ№й–“гҒ®гғҶгғјгғ‘гғјд»ҳгҒҚгғҒгғҘгғјгғ–пјҲи…•гғ»и„ҡгғ»й«ӘжҲҝгғ»зҢ«иҖіпјү
  function tube(p0,p1,r0,r1,seg,c){
    var ax=p1[0]-p0[0], ay=p1[1]-p0[1], az=p1[2]-p0[2];
    var al=Math.hypot(ax,ay,az)||1; ax/=al; ay/=al; az/=al;
    var ux=az, uz=-ax, ul=Math.hypot(ux,uz);
    if(ul<.01){ ux=1; uz=0; } else { ux/=ul; uz/=ul; }
    var vx=-az*0+ay*uz, vy=az*ux-ax*uz, vz=ax*0-ay*ux; // cross(axis,u)
    function P(t,end){
      var b=end?p1:p0, r=end?r1:r0;
      var dx=Math.cos(t)*ux+Math.sin(t)*vx,
          dy=Math.sin(t)*vy,
          dz=Math.cos(t)*uz+Math.sin(t)*vz;
      return [b[0]+dx*r, b[1]+dy*r, b[2]+dz*r, dx,dy,dz];
    }
    for(var i=0;i<seg;i++){
      var t0=i/seg*2*Math.PI, t1=(i+1)/seg*2*Math.PI;
      var q=[P(t0,0),P(t0,1),P(t1,1),P(t0,0),P(t1,1),P(t1,0)];
      for(var k=0;k<6;k++){ var p=q[k]; vert(p[0],p[1],p[2],p[3],p[4],p[5],c); }
      if(r1>.02){
        var c1=P(t0,1), c2=P(t1,1);
        vert(p1[0],p1[1],p1[2],ax,ay,az,c);
        vert(c1[0],c1[1],c1[2],ax,ay,az,c);
        vert(c2[0],c2[1],c2[2],ax,ay,az,c);
      }
      if(r0>.02){
        var c3=P(t0,0), c4=P(t1,0);
        vert(p0[0],p0[1],p0[2],-ax,-ay,-az,c);
        vert(c4[0],c4[1],c4[2],-ax,-ay,-az,c);
        vert(c3[0],c3[1],c3[2],-ax,-ay,-az,c);
      }
    }
  }

  // гӮӯгғЈгғ©гӮҜгӮҝгғјгӮ·гғјгғҲгҒ®й…ҚиүІ
  var BLACK=[.12,.10,.16], HAT=[.09,.075,.13], CRIM=[.66,.13,.27],
      GOLD=[.93,.76,.3], HAIR=[.97,.76,.3], SKIN=[1,.88,.8], DARK=[.075,.06,.11];

  // й«ӘпјҲйҮ‘й«ӘгғӯгғігӮ°пјү
  sphere(0,1.38,-.10,.40,.36,.40,18,12,HAIR);          // й ӯй ӮгҖңеҫҢй ӯйғЁ
  sphere(0,.9,-.3,.24,.5,.16,14,10,HAIR);              // иғҢдёӯгҒ«жөҒгӮҢгӮӢй•·гҒ„й«Ә
  tube([-.33,1.25,-.06],[-.38,.55,.02],.09,.02,10,HAIR); // жЁӘгҒ®й«ӘжҲҝ
  tube([ .33,1.25,-.06],[ .38,.55,.02],.09,.02,10,HAIR);
  // еүҚй«ӘпјҲйЎҚгӮ’иҰҶгҒҶгғ•гғӘгғігӮёпјӢеһӮгӮҢгӮӢжҲҝпјү
  cone(0,.02, 1.38,.40, 1.58,.28, Math.PI*.5-1.35, Math.PI*.5+1.35, 12, HAIR);
  tube([-.15,1.42,.3],[-.19,1.27,.37],.08,.01,8,HAIR);
  tube([  0,1.44,.33],[  0,1.28,.41],.09,.01,8,HAIR);
  tube([ .15,1.42,.3],[ .19,1.27,.37],.08,.01,8,HAIR);
  // й ӯ
  sphere(0,1.32,.02,.36,.36,.36,20,14,SKIN);
  // дҪ“пјҲй»’гҒ„гӮігғјгғҲпјӢз·ӢиүІгҒ®гӮ№гӮ«гғјгғҲпјӢйҮ‘гҒ®иЈҫпјү
  cone(0,0,.78,.19,1.02,.14,0,Math.PI*2,14,BLACK);
  cone(0,0,.5,.45,.78,.2,0,Math.PI*2,18,CRIM);
  cone(0,0,.47,.46,.5,.45,0,Math.PI*2,18,GOLD);
  sphere(0,.95,.16,.05,.05,.05,8,6,GOLD);               // иғёе…ғгҒ®жҳҹйЈҫгӮҠ
  // гғһгғігғҲпјҲеүҚй–ӢгҒҚгҒ®еҶҶйҢҗгӮ·гғјгғҲпјү
  cone(0,0,.12,.8,1.05,.24, Math.PI*.7, Math.PI*2.3, 20, DARK);
  // и…•гҒЁжүӢ
  tube([-.17,.97,.02],[-.5,.78,.14],.06,.045,10,BLACK);
  tube([ .17,.97,.02],[ .5,.78,.14],.06,.045,10,BLACK);
  sphere(-.52,.76,.16,.055,.055,.055,10,7,SKIN);
  sphere( .52,.76,.16,.055,.055,.055,10,7,SKIN);
  // и„ҡпјҲгғӢгғјгӮҪгғғгӮҜгӮ№пјүгҒЁгғ–гғјгғ„
  tube([-.1,.6,0],[-.09,.12,0],.07,.055,10,DARK);
  tube([ .1,.6,0],[ .09,.12,0],.07,.055,10,DARK);
  tube([-.09,.14,0],[-.09,.02,0],.075,.075,10,HAT);
  tube([ .09,.14,0],[ .09,.02,0],.075,.075,10,HAT);
  sphere(-.09,.05,.09,.07,.05,.1,8,6,HAT);
  sphere( .09,.05,.09,.07,.05,.1,8,6,HAT);
  // йӯ”еҘіеёҪеӯҗпјҲй»’гғ»гҒӨгҒ°иЈҸгҒҜз·ӢиүІгғ»зҢ«иҖігғ»жҠҳгӮҢгҒҹе…Ҳз«Ҝпјү
  cone(0,0,1.56,.68,1.64,.2,0,Math.PI*2,22,HAT);        // гҒӨгҒ°дёҠйқў

function spawnBoltChain(p0,p1,stops){
  var seg=9, px=p0[0],py=p0[1],pz=p0[2];
  for(var i=1;i<=seg;i++){
    var f=i/seg;
    var nx=lerp(p0[0],p1[0],f)+rand(-.16,.16);
    var ny=lerp(p0[1],p1[1],f)+rand(-.16,.16);
    var nz=lerp(p0[2],p1[2],f)+rand(-.16,.16);
    var d=Math.hypot(nx-px,ny-py,nz-pz), steps=Math.max(1,Math.ceil(d/.08));
    for(var s2=0;s2<steps;s2++){
      var g2=s2/steps;
      sysSoft.spawn({
        x:lerp(px,nx,g2), y:lerp(py,ny,g2), z:lerp(pz,nz,g2),
        vx:0,vy:0,vz:0, life:rand(.1,.2),
        size0:.12, size1:.03, stops:stops
      });
    }
    px=nx;py=ny;pz=nz;
  }
}

    camFacingQuad(meshChaos, -.85, 1.1, 0, .42, -t*1.6, [1,.35,.42,.8*p]);
    camFacingQuad(meshChaos,  .85, 1.1, 0, .42,  t*1.6, [1,.35,.42,.8*p]);
    // и¶іе…ғгҒ®з·ӢиүІгҒ®гғӘгғігӮ°
    meshRing.flatQuad(0,.02,0,1.5, t*.25,[1,.2,.3,.5*p]);
  }
},
{ id:'witch', name:'гӮ№гӮ«гғјгғ¬гғғгғҲ', desc:'йӯ”еҘігӮ№гӮ«гғјгғ¬гғғгғҲгҒ®3DгғўгғҮгғ«пјӢж··жІҢйӯ”жі•',
  reset:function(st){ st.tend=0; },
  update:function(st,dt,t){
    // еҪјеҘігҒ®гҒҫгӮҸгӮҠгӮ’жҳҮгӮӢз·ӢиүІгҒ®йӯ”еҠӣ
    if(Math.random()<dt*40){
      var a=rand(0,6.28), r=rand(.7,1.3);
      sysFlare.spawn({
        orbit:true, cx:0, cz:0, r:r, ang:a, angV:rand(1.5,2.8), vr:-.15,
        x:Math.cos(a)*r, y:rand(.1,.4), z:Math.sin(a)*r, vy:rand(.5,1.2),
        life:rand(1.3,2.4), size0:rand(.05,.12), size1:.02, stops:STOP_CHAOS
      });
    }
    // дёЎжүӢе…ғгҒ®ијқгҒҚ
    if(Math.random()<dt*20){
      var s=Math.random()<.5?-1:1;
      sysSoft.spawn({
        x:s*.52+rand(-.1,.1), y:.78+rand(-.1,.1), z:.18+rand(-.02,.12),
        vx:rand(-.15,.15), vy:rand(0,.25), vz:rand(0,.2),
        life:rand(.35,.7), size0:rand(.2,.4), size1:.06,
        rot:rand(0,6.28), rotV:rand(-2,2), stops:STOP_CHAOS
      });
    }
    // жҳҹйЈҫгӮҠгҒ«е‘јеҝңгҒҷгӮӢйҮ‘гҒ®гҒҚгӮүгӮҒгҒҚ
    if(Math.random()<dt*6){
      sysFlare.spawn({
        x:rand(-.6,.6), y:rand(.6,1.9), z:rand(-.2,.5),
        vx:0, vy:rand(.1,.3), vz:0, life:rand(.5,.9), size0:.02, size1:.2,
        stops:[[0,1,.95,.7,0],[.3,1,.85,.45,.9],[1,.75,.45,.15,0]]
      });
    }
    // еүҚж–№гҒ®еӨ§гҒҚгҒӘйҷЈгҒ®гҒөгҒЎгҒ§ејҫгҒ‘гӮӢж”ҫйӣ»
    st.tend-=dt;
    if(st.tend<=0){
      st.tend=rand(.15,.35);
      var a0=rand(0,6.28), a1=a0+rand(.8,2.2), R=.62;
      spawnBoltChain(
        [Math.cos(a0)*R, 1.12+Math.sin(a0)*R*.85, .85+rand(-.08,.08)],
        [Math.cos(a1)*R, 1.12+Math.sin(a1)*R*.85, .85+rand(-.08,.08)],
        STOP_CBOLT);
    }
  },
  draw:function(st,t){
    var bob=Math.sin(t*1.8)*.05;
    var p=.72+Math.sin(t*3.1)*.2;
    // и© е”ұдёӯгҒ®ж··жІҢгҒ®йҷЈпјҲжӯЈйқўгҒ«еӨ§гғ»дёЎжүӢе…ғгҒ«е°Ҹпјү
    camFacingQuad(meshChaos, 0, 1.12+bob*.6, .85, .6+Math.sin(t*2.5)*.04, t*.8, [1,.28,.36,.9*p]);
    camFacingQuad(meshChaos, -.52, .78+bob, .18, .26, -t*1.7, [1,.35,.42,.75*p]);
    camFacingQuad(meshChaos,  .52, .78+bob, .18, .26,  t*1.7, [1,.35,.42,.75*p]);
    meshRing.flatQuad(0,.02,0,1.2, t*.2,[1,.2,.3,.4*p]);
    // йЎ”гҒ®гғҮгӮ«гғјгғ«пјҲй ӯгҒ®зҗғгҒ®жӯЈйқўгҒ«иІјгӮӢпјү
    var z=.385, w=[1,1,1,1];
    meshFace.quad(
      [[-.21,1.13+bob,z],[.21,1.13+bob,z],[.21,1.55+bob,z],[-.21,1.55+bob,z]],
      [w,w,w,w]
    );
  }
}
];

/* ---------- гӮ«гғЎгғ© ---------- */
var cam={yaw:.7, pitch:.42, dist:6.2, auto:true};
var drag=null, pinch0=0;
canvas.addEventListener('pointerdown',function(e){
  cam.auto=false; drag={x:e.clientX,y:e.clientY,id:e.pointerId};
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove',function(e){
  if(!drag||e.pointerId!==drag.id) return;
  cam.yaw  -=(e.clientX-drag.x)*.008;
  cam.pitch+=(e.clientY-drag.y)*.006;
  cam.pitch=clamp(cam.pitch,.06,1.35);
  drag.x=e.clientX; drag.y=e.clientY;
});
canvas.addEventListener('pointerup',function(){ drag=null; });
canvas.addEventListener('pointercancel',function(){ drag=null; });
canvas.addEventListener('wheel',function(e){
  e.preventDefault();
  cam.dist=clamp(cam.dist*(1+e.deltaY*.0012),3,14);
},{passive:false});
canvas.addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    drag=null;
    pinch0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                      e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:true});
canvas.addEventListener('touchmove',function(e){
  if(e.touches.length===2){
    e.preventDefault();
    var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                     e.touches[0].clientY-e.touches[1].clientY);
    if(pinch0>0) cam.dist=clamp(cam.dist*pinch0/d,3,14);
    pinch0=d;
  }
},{passive:false});

/* ---------- UI ---------- */
var current=0, fxState={}, simT=0, speed=1, paused=false;
var fxrow=document.getElementById('fxrow');
EFFECTS.forEach(function(fx,i){
  var b=document.createElement('button');
  b.className='chip'+(i===0?' on':'');
  b.setAttribute('role','tab');
  b.textContent=fx.name;
  b.title=fx.desc;
  b.addEventListener('click',function(){ setEffect(i); });
  fxrow.appendChild(b);
});
function setEffect(i){
  current=i; simT=0; fxState={};
  EFFECTS[i].reset(fxState);
  systems.forEach(function(s){ s.list.length=0; });
  var chips=fxrow.children;
  for(var k=0;k<chips.length;k++) chips[k].classList.toggle('on',k===i);
}
EFFECTS[0].reset(fxState);

var pauseBtn=document.getElementById('pause');
function setPaused(v){
  paused=v;
  pauseBtn.textContent=paused?'в–¶ еҶҚз”ҹ':'вҸё еҒңжӯў';
  pauseBtn.setAttribute('aria-label',paused?'еҶҚз”ҹ':'дёҖжҷӮеҒңжӯў');
}
pauseBtn.addEventListener('click',function(){ setPaused(!paused); });
if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches) setPaused(true);

Array.prototype.forEach.call(document.querySelectorAll('.spd'),function(b){
  b.addEventListener('click',function(){
    speed=parseFloat(b.dataset.s);
    document.querySelectorAll('.spd').forEach(function(x){ x.classList.toggle('on',x===b); });
  });
});

/* ---------- жҸҸз”»гғ«гғјгғ— ---------- */
var locP={aPos:gl.getAttribLocation(progPoint,'aPos'),
          aSize:gl.getAttribLocation(progPoint,'aSize'),
          aColor:gl.getAttribLocation(progPoint,'aColor'),
          aRot:gl.getAttribLocation(progPoint,'aRot'),
          uVP:gl.getUniformLocation(progPoint,'uVP'),
          uScale:gl.getUniformLocation(progPoint,'uScale')};
var locM={aPos:gl.getAttribLocation(progMesh,'aPos'),
          aUV:gl.getAttribLocation(progMesh,'aUV'),
          aColor:gl.getAttribLocation(progMesh,'aColor'),
          uVP:gl.getUniformLocation(progMesh,'uVP')};
var locL={aPos:gl.getAttribLocation(progLit,'aPos'),
          aNrm:gl.getAttribLocation(progLit,'aNrm'),
          aCol:gl.getAttribLocation(progLit,'aCol'),
          uVP:gl.getUniformLocation(progLit,'uVP'),
          uOff:gl.getUniformLocation(progLit,'uOff')};

function resize(){
  var dpr=Math.min(window.devicePixelRatio||1,2);
  var w=Math.floor(canvas.clientWidth*dpr), h=Math.floor(canvas.clientHeight*dpr);
  if(canvas.width!==w||canvas.height!==h){ canvas.width=w; canvas.height=h; }
}
window.addEventListener('resize',resize);

gl.enable(gl.BLEND);
gl.enable(gl.DEPTH_TEST);
gl.clearColor(0.02,0.028,0.05,1);

var fpsEl=document.getElementById('fps'), pcEl=document.getElementById('pc');
var frames=0, fpsT=0, last=performance.now();

function frame(now){
  requestAnimationFrame(frame);
  var dt=Math.min((now-last)/1000,.05); last=now;

  frames++; fpsT+=dt;
  if(fpsT>=.5){
    fpsEl.textContent=Math.round(frames/fpsT);
    pcEl.textContent=sysSoft.list.length+sysFlare.list.length+sysSmoke.list.length;
    frames=0; fpsT=0;
  }

  resize();
  var sdt=paused?0:dt*speed;
  simT+=sdt;
  if(cam.auto) cam.yaw+=dt*.12;

  var fx=EFFECTS[current];
  if(sdt>0){
    fx.update(fxState,sdt,simT);
    systems.forEach(function(s){ s.update(sdt); });
  }

  meshes.forEach(function(m){ m.begin(); });
  fx.draw(fxState,simT);

  // гӮ«гғЎгғ©иЎҢеҲ—
  var cy=Math.cos(cam.pitch)*cam.dist, sy=Math.sin(cam.pitch)*cam.dist;
  var eye=[Math.sin(cam.yaw)*cy, sy+.6, Math.cos(cam.yaw)*cy];
  var aspect=canvas.width/Math.max(1,canvas.height);
  var vp=mat4Mul(mat4Perspective(.9,aspect,.1,100), mat4LookAt(eye,[0,.9,0]));

  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);

  // гӮ№гӮ«гғјгғ¬гғғгғҲпјҲ3DгғўгғҮгғ«гғ»дёҚйҖҸжҳҺпјү
  if(fx.id==='witch'){
    var bob=Math.sin(simT*1.8)*.05;
    gl.useProgram(progLit);
    gl.uniformMatrix4fv(locL.uVP,false,vp);
    gl.uniform3f(locL.uOff,0,bob,0);
    gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
    gl.depthMask(true);
    gl.bindBuffer(gl.ARRAY_BUFFER,witchModel.buf);
    gl.enableVertexAttribArray(locL.aPos);
    gl.enableVertexAttribArray(locL.aNrm);
    gl.enableVertexAttribArray(locL.aCol);
    gl.vertexAttribPointer(locL.aPos,3,gl.FLOAT,false,36,0);
    gl.vertexAttribPointer(locL.aNrm,3,gl.FLOAT,false,36,12);
    gl.vertexAttribPointer(locL.aCol,3,gl.FLOAT,false,36,24);
    gl.drawArrays(gl.TRIANGLES,0,witchModel.n);
    gl.disableVertexAttribArray(locL.aPos);
    gl.disableVertexAttribArray(locL.aNrm);
    gl.disableVertexAttribArray(locL.aCol);
  }

  // ең°йқў
  gl.useProgram(progMesh);
  gl.uniformMatrix4fv(locM.uVP,false,vp);
  gl.enableVertexAttribArray(locM.aPos);
  gl.enableVertexAttribArray(locM.aUV);
  gl.enableVertexAttribArray(locM.aColor);
  gl.depthMask(true);
  meshGround.begin();
  meshGround.flatQuad(0,0,0,9,0,[1,1,1,1]);
  meshGround.draw(locM);

  // гӮЁгғ•гӮ§гӮҜгғҲгҒ®жқҝгғқгғӘ
  gl.depthMask(false);
  meshes.forEach(function(m){ m.draw(locM); });
  gl.disableVertexAttribArray(locM.aPos);
  gl.disableVertexAttribArray(locM.aUV);
  gl.disableVertexAttribArray(locM.aColor);

  // гғ‘гғјгғҶгӮЈгӮҜгғ«
  gl.useProgram(progPoint);
  gl.uniformMatrix4fv(locP.uVP,false,vp);
  gl.uniform1f(locP.uScale, canvas.height/(2*Math.tan(.45)));
  gl.enableVertexAttribArray(locP.aPos);
  gl.enableVertexAttribArray(locP.aSize);
  gl.enableVertexAttribArray(locP.aColor);
  gl.enableVertexAttribArray(locP.aRot);
  systems.forEach(function(s){ s.draw(locP); });
  gl.disableVertexAttribArray(locP.aPos);
  gl.disableVertexAttribArray(locP.aSize);
  gl.disableVertexAttribArray(locP.aColor);
  gl.disableVertexAttribArray(locP.aRot);
  gl.depthMask(true);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
