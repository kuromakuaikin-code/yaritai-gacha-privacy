# XcodeGen 用プロジェクト定義（任意）
# `brew install xcodegen && cd ios-gomicalendar && xcodegen` で GomiCalendar.xcodeproj が生成される。
# XcodeGen を使わない場合は README.md の手動セットアップ手順を参照。
name: GomiCalendar
options:
  bundleIdPrefix: com.kuromakuaikin
  deploymentTarget:
    iOS: "17.0"
targets:
  GomiCalendar:
    type: application
    platform: iOS
    sources: [GomiCalendar]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kuromakuaikin.gomicalendar
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: ゴミ出しカレンダー
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: 1
        GENERATE_INFOPLIST_FILE: YES
